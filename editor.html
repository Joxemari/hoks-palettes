<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hoks — editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
  --ink: #e8e8e8; --ink3: #555; --accent: #f5d216;
  --f: 'Courier New', Courier, monospace;
}
body { font-family: var(--f); background: var(--bg); color: var(--ink); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

.header {
  height: 44px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.family-name { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; }
.family-slug { font-size: 9px; color: var(--ink3); letter-spacing: 0.08em; }
.header-right { display: flex; align-items: center; gap: 8px; }
.btn {
  font-family: var(--f); font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; border: none; border-radius: 2px;
  padding: 7px 16px; cursor: pointer; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.8; }
.btn-run  { background: var(--accent); color: #000; }
.btn-save { background: var(--ink); color: var(--bg); }
.btn-ghost { background: transparent; color: var(--ink3); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--ink); border-color: #555; opacity: 1; }
.status { font-size: 9px; letter-spacing: 0.06em; min-width: 140px; text-align: right; color: var(--ink3); }
.status.err { color: #ff6b6b; }

.layout { display: grid; grid-template-columns: 1fr 1fr; flex: 1; min-height: 0; }
.pane { display: flex; flex-direction: column; min-height: 0; }
.pane + .pane { border-left: 1px solid var(--border); }

.pane-header {
  height: 32px; display: flex; align-items: center; padding: 0 14px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  font-size: 9px; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase;
  justify-content: space-between;
}
#code {
  flex: 1; width: 100%; resize: none; outline: none; border: none;
  background: var(--bg); color: #e8e8e8;
  font-family: var(--f); font-size: 12px; line-height: 1.7;
  padding: 16px; tab-size: 2; overflow: auto;
}
.preview-pane { flex: 1; position: relative; overflow: hidden; background: #111; }
#workFrame {
  width: 100%; height: 100%; border: none;
  display: block;
}
.frame-loading {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 9px; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase;
}
.bottom-bar {
  height: 36px; display: flex; align-items: center; padding: 0 14px; gap: 16px;
  border-top: 1px solid var(--border); flex-shrink: 0;
  font-size: 9px; color: var(--ink3);
  background: var(--surface);
}
.seed-val { color: var(--ink); font-size: 10px; letter-spacing: 0.04em; }
.error-bar {
  display: none; padding: 8px 14px; background: #1a0808;
  border-top: 1px solid #3a1010; font-size: 10px; color: #ff6b6b;
  flex-shrink: 0; max-height: 80px; overflow-y: auto;
}
.error-bar.show { display: block; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div>
      <div class="family-name" id="familyName">—</div>
      <div class="family-slug" id="familySlug"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="status" id="status">Loading…</span>
    <button class="btn btn-ghost" onclick="newSeed()">↻ Seed</button>
    <button class="btn btn-run"  onclick="runCode()">▶ Run</button>
    <button class="btn btn-save" onclick="saveCode()">↓ Save</button>
  </div>
</div>

<div class="layout">
  <!-- CODE -->
  <div class="pane">
    <div class="pane-header">
      <span>Draw algorithm · JS</span>
      <span style="color:#333;">Cmd+Enter to run · Cmd+S to save</span>
    </div>
    <textarea id="code" spellcheck="false" placeholder="// Loading…"></textarea>
    <div class="error-bar" id="errorBar"></div>
  </div>

  <!-- PREVIEW (iframe of actual work page) -->
  <div class="pane">
    <div class="pane-header">
      <span>Preview</span>
      
    </div>
    <div class="preview-pane">
      <div class="frame-loading" id="frameLoading">Loading work…</div>
      <iframe id="workFrame" style="opacity:0;"></iframe>
    </div>
    <div class="bottom-bar">
      <span>Seed</span>
      <span class="seed-val" id="seedDisplay">—</span>
      <span style="margin-left:auto;font-size:9px;color:var(--ink3);">Random palette</span>
    </div>
  </div>
</div>

<script>
const RAW  = 'https://raw.githubusercontent.com/Joxemari/hoks/main/data/';
const BASE = 'https://joxemari.github.io/hoks/';
const GH_TOKEN_KEY = 'hoks-gh-token';
const REPO = 'Joxemari/hoks';

const params   = new URLSearchParams(location.search);
const familyId = params.get('family') || '';
let works = [], currentWork = null, palettes = [];
let frameReady = false;
let currentSeed = (Math.random() * 0xFFFFFFFF) >>> 0;

// ── Init ──────────────────────────────────────────────
async function init() {
  try {
    [works, palettes] = await Promise.all([
      fetch(RAW + 'works.json?t=' + Date.now()).then(r => r.json()),
      fetch(RAW + 'palettes.json?t=' + Date.now()).then(r => r.json()).then(d => d.filter(p => p.active !== false))
    ]);
  } catch(e) { setStatus('Load error: ' + e.message, true); return; }

  currentWork = works.find(w => w.id === familyId || w.slug === familyId);

  if (currentWork) {
    document.getElementById('familyName').textContent = currentWork.name;
    document.getElementById('familySlug').textContent = currentWork.page || currentWork.slug + '.html';
    document.title = 'hoks editor — ' + currentWork.name;

    // Load draw code into textarea
    const code = currentWork.drawCode || '';
    document.getElementById('code').value = code;

    // Load iframe with the actual work page
    loadFrame();
    setStatus('Ready');
  } else {
    document.getElementById('familyName').textContent = familyId ? 'Not found: ' + familyId : 'No family';
    setStatus(familyId ? 'Family not in works.json' : 'Add ?family=slug to URL', true);
  }
}

// ── Frame ─────────────────────────────────────────────
function loadFrame() {
  const frame = document.getElementById('workFrame');
  const page  = currentWork.page || currentWork.slug + '.html';
  frame.onload = onFrameLoad;
  frame.src = BASE + page;
}

function onFrameLoad() {
  const frame = document.getElementById('workFrame');
  document.getElementById('frameLoading').style.display = 'none';
  frame.style.opacity = '1';
  frameReady = true;

  // Inject palette list into iframe
  try {
    const fw = frame.contentWindow;
    if (palettes.length && fw.palettes !== undefined) {
      // Wait for iframe palettes to load, then auto-run
      const check = setInterval(() => {
        if (fw.palettes && fw.palettes.length > 0) {
          clearInterval(check);
          setStatus('Ready — press ▶ Run');
        }
      }, 200);
      setTimeout(() => clearInterval(check), 5000);
    }
  } catch(e) {} // cross-origin guard
}

// ── Run ───────────────────────────────────────────────
function runCode() {
  if (!frameReady) { setStatus('Frame not ready yet', true); return; }
  const code = document.getElementById('code').value.trim();
  if (!code) { setStatus('No code to run', true); return; }

  const frame = document.getElementById('workFrame');
  try {
    const fw = frame.contentWindow;

    // Override the draw function in the iframe with editor code
    // We wrap it so it has access to all the iframe's globals
    const slug = currentWork.slug;

    // Different draw signatures for different families
    const paramName = slug === 'pills' ? 's' : 'seed';
    const drawFnSrc = `(function() {
      window._editorDraw = function(${paramName}) {
        ${code}
      };
      // Override the page's draw function
      window.draw = window._editorDraw;
    })()`;

    fw.eval(drawFnSrc);

    // Set seed
    fw.currentSeed = currentSeed;

    // Trigger draw via scrambleAndDraw
    if (typeof fw.scrambleAndDraw === 'function') {
      fw._generating = false;
      fw.scrambleAndDraw(currentSeed, () => fw.draw(currentSeed));
    } else if (typeof fw.draw === 'function') {
      fw._generating = false;
      fw.draw(currentSeed);
    }

    document.getElementById('seedDisplay').textContent = '#' + currentSeed;
    document.getElementById('errorBar').classList.remove('show');
    setStatus('Ran · #' + currentSeed);
  } catch(e) {
    document.getElementById('errorBar').textContent = e.toString();
    document.getElementById('errorBar').classList.add('show');
    setStatus('Error — see below', true);
  }
}

function newSeed() {
  currentSeed = (Math.random() * 0xFFFFFFFF) >>> 0;
  runCode();
}

// ── Palette ───────────────────────────────────────────
function buildPalSelect() {
  const sel = document.getElementById('palSelect');
  sel.innerHTML = palettes.map((p,i) =>
    `<option value="${i}">${p.name}</option>`).join('');
  document.getElementById('palInfo').textContent = palettes.length + ' palettes';
}


// ── Save ──────────────────────────────────────────────
async function saveCode() {
  const token = localStorage.getItem(GH_TOKEN_KEY);
  if (!token) { setStatus('No GitHub token — log in to admin first', true); return; }
  if (!currentWork) { setStatus('No work loaded', true); return; }

  currentWork.drawCode = document.getElementById('code').value;

  try {
    setStatus('Saving…');
    let sha;
    try {
      const r = await fetch(`https://api.github.com/repos/${REPO}/contents/data/works.json`,
        {headers:{'Authorization':'Bearer '+token}});
      if (r.ok) sha = (await r.json()).sha;
    } catch(e) {}

    const body = {
      message: `editor: update ${currentWork.name} draw code`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(works, null, 2))))
    };
    if (sha) body.sha = sha;

    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/data/works.json`, {
      method: 'PUT',
      headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });

    setStatus(r.ok ? ('Saved ✓ ' + new Date().toLocaleTimeString()) : ('Save failed ' + r.status), !r.ok);
  } catch(e) { setStatus('Save error: ' + e.message, true); }
}

function setStatus(msg, isErr = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isErr ? ' err' : '');
}

// ── Keyboard ──────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && !e.shiftKey && e.key === 'Enter') { e.preventDefault(); runCode(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveCode(); }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'Enter') { e.preventDefault(); newSeed(); }
});

document.getElementById('code').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target, s = el.selectionStart, end = el.selectionEnd;
    el.value = el.value.substring(0,s) + '  ' + el.value.substring(end);
    el.selectionStart = el.selectionEnd = s + 2;
  }
});

init();
</script>
</body>
</html>
