<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hoks — code editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#fff; --surface:#f7f7f7; --ink:#111; --ink3:#bbb; --border:#e8e8e8; --border-dark:#d0d0d0; --f:'Courier New',Courier,monospace; --r:2px; }
body { font-family:var(--f); background:var(--bg); color:var(--ink); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
nav { display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; height:52px; flex-shrink:0; background:var(--bg); border-bottom:1px solid var(--border); }
.nav-left { display:flex; align-items:center; gap:12px; }
.nav-logo { display:flex; align-items:center; gap:8px; text-decoration:none; color:var(--ink); }
.nav-dot { width:12px; height:12px; border-radius:50%; background:var(--ink); }
.nav-name { font-size:11px; letter-spacing:0.08em; }
.nav-tag { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink3); }
.nav-right { display:flex; gap:8px; align-items:center; }
.nav-btn { font-family:var(--f); font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; background:none; border:1px solid var(--border-dark); color:var(--ink); padding:5px 12px; cursor:pointer; border-radius:var(--r); text-decoration:none; transition:background 0.15s; }
.nav-btn:hover { background:var(--surface); }
.nav-btn.primary { background:var(--ink); color:#fff; border-color:var(--ink); }
.nav-btn.primary:hover { opacity:0.8; }

#layout { display:flex; flex:1; overflow:hidden; }

#code-pane { width:55%; display:flex; flex-direction:column; border-right:1px solid var(--border); }
#code-toolbar { display:flex; align-items:center; justify-content:space-between; padding:0 14px; height:40px; flex-shrink:0; border-bottom:1px solid var(--border); background:var(--surface); }
#code-label { font-size:9px; color:var(--ink3); letter-spacing:0.1em; text-transform:uppercase; }
#code-actions { display:flex; gap:6px; }
.ed-btn { font-family:var(--f); font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; background:none; border:1px solid var(--border-dark); color:var(--ink); padding:3px 10px; cursor:pointer; border-radius:var(--r); transition:background 0.12s; }
.ed-btn:hover { background:var(--bg); }
.ed-btn.primary { background:var(--ink); color:#fff; border-color:var(--ink); }
.ed-btn.primary:hover { opacity:0.8; }

#code { flex:1; width:100%; border:none; outline:none; resize:none; font-family:var(--f); font-size:11px; line-height:1.65; padding:14px 16px; background:var(--bg); color:var(--ink); tab-size:2; overflow-y:auto; }
#code::placeholder { color:var(--ink3); }
#save-status { padding:6px 14px; font-size:9px; color:var(--ink3); letter-spacing:0.06em; text-transform:uppercase; flex-shrink:0; border-top:1px solid var(--border); height:30px; display:flex; align-items:center; }

#preview-pane { flex:1; display:flex; flex-direction:column; background:var(--surface); }
#preview-toolbar { display:flex; align-items:center; justify-content:space-between; padding:0 14px; height:40px; border-bottom:1px solid var(--border); flex-shrink:0; }
#seed-info { font-size:9px; color:var(--ink3); letter-spacing:0.08em; text-transform:uppercase; }
#canvas-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; overflow:hidden; }
canvas { display:block; max-width:100%; max-height:100%; outline:1px solid rgba(0,0,0,0.1); }

#error-bar { display:none; padding:6px 14px; font-size:10px; color:#c0392b; background:#fdf0f0; border-top:1px solid #f5c0c0; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:#fff; font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:8px 18px; opacity:0; transition:all 0.2s; pointer-events:none; z-index:99; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:200; font-size:11px; color:var(--ink3); letter-spacing:0.1em; text-transform:uppercase; }

/* ── MOBILE ── */
@media (max-width: 680px) {
  #layout { flex-direction: column; }
  #code-pane { width: 100%; height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
  #preview-pane { height: 50vh; }
  #canvas-wrap { padding: 8px; }
  canvas { max-height: 100%; }
}
</style>
</head>
<body>

<div id="gate">checking session…</div>

<nav>
  <div class="nav-left">
    <a class="nav-logo" href="index.html"><span class="nav-dot"></span><span class="nav-name">hoks</span></a>
    <span class="nav-tag" id="nav-tag">— · code</span>
  </div>
  <div class="nav-right">
    <a class="nav-btn" href="admin.html">← Admin</a>
    <button class="nav-btn" id="regen-btn">↻ New Seed</button>
    <button class="nav-btn primary" id="run-btn">▶ Run</button>
  </div>
</nav>

<div id="layout">
  <div id="code-pane">
    <div id="code-toolbar">
      <span id="code-label" style="font-size:9px;color:var(--ink3);letter-spacing:0.1em;text-transform:uppercase;">draw code</span>
      <div id="code-actions">
        <button class="ed-btn" id="clear-btn">Clear</button>
        <button class="ed-btn primary" id="save-btn">Save to works.json</button>
      </div>
    </div>
    <textarea id="code" spellcheck="false" autocorrect="off" autocapitalize="off"
      placeholder="// Paste your draw function from OpenProcessing"></textarea>
    <div id="error-bar"></div>
    <div id="save-status">—</div>
  </div>

  <div id="preview-pane">
    <div id="preview-toolbar">
      <span id="seed-info">seed · —</span>
    </div>
    <div id="canvas-wrap"><canvas id="c"></canvas></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────
const gate = document.getElementById('gate');
const isAdmin = sessionStorage.getItem('hoks-admin-session') === '1' ||
                localStorage.getItem('hoks-admin-session')   === '1';
if (!isAdmin) { gate.textContent = 'Access denied — log in via admin first'; }
else          { gate.style.display = 'none'; }

// ── SETUP ─────────────────────────────────────────────────────────
const FAMILY   = new URLSearchParams(window.location.search).get('family') || 'krrtk';
const REPO     = 'Joxemari/hoks';
const GH_KEY   = 'hoks-gh-token';
const RAW      = 'https://raw.githubusercontent.com/Joxemari/hoks/main/data/';
const SIZES    = { plls:[1414,1000], pllsg:[1414,1000] };
const [CW, CH] = SIZES[FAMILY] || [600, 600];

document.getElementById('nav-tag').textContent = FAMILY.toUpperCase() + ' · code';
document.title = 'hoks — ' + FAMILY.toUpperCase() + ' code';

const canvas  = document.getElementById('c');
canvas.width  = CW; canvas.height = CH;
const ctx     = canvas.getContext('2d');
const textarea = document.getElementById('code');
const errorBar = document.getElementById('error-bar');
const seedInfo = document.getElementById('seed-info');
const saveStatus = document.getElementById('save-status');

// ── RNG ───────────────────────────────────────────────────────────
class Rng {
  constructor(s){this.s=(s|0)>>>0;}
  next(){this.s=((Math.imul(1664525,this.s)+1013904223)>>>0);return this.s/4294967296;}
  int(a,b){return Math.floor(a+this.next()*(b-a+1));}
  range(a,b){return a+this.next()*(b-a);}
  bool(p){return this.next()<p;}
  pickFrom(arr){return arr[this.int(0,arr.length-1)];}
  weighted(arr){let v=this.next(),acc=0;for(const i of arr){acc+=i.prob;if(v<acc)return i;}return arr[arr.length-1];}
}

// ── LOAD saved code from works.json ──────────────────────────────
async function loadSavedCode() {
  try {
    const works = await fetch(RAW+'works.json?t='+Date.now()).then(r=>r.ok?r.json():null);
    if (!works) return;
    const work = works.find(w => w.slug === FAMILY || (FAMILY==='plls' && w.slug==='pills'));
    if (work && work.drawCode) {
      textarea.value = work.drawCode;
      saveStatus.textContent = 'Last saved · ' + (work.codeUpdated ? new Date(work.codeUpdated).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—');
      run();
    }
  } catch(e) {}
}

// ── RUN ───────────────────────────────────────────────────────────
let currentSeed = (Math.random() * 0xFFFFFFFF) >>> 0;

function run() {
  if (!textarea.value.trim()) return;
  errorBar.style.display = 'none';
  try {
    const fn = new Function('ctx','W','H','seed','Rng', textarea.value + '\n; draw(ctx,W,H,seed,Rng);');
    ctx.clearRect(0,0,CW,CH);
    fn(ctx, CW, CH, currentSeed, Rng);
    seedInfo.textContent = 'seed · #' + currentSeed;
  } catch(e) {
    errorBar.style.display = 'block';
    errorBar.textContent = '⚠ ' + e.message;
  }
}

document.getElementById('run-btn').addEventListener('click', run);
document.getElementById('regen-btn').addEventListener('click', () => {
  currentSeed = (Math.random() * 0xFFFFFFFF) >>> 0;
  run();
});
document.getElementById('clear-btn').addEventListener('click', () => {
  if (textarea.value && !confirm('Clear code?')) return;
  textarea.value = '';
  ctx.clearRect(0,0,CW,CH);
  errorBar.style.display = 'none';
  seedInfo.textContent = 'seed · —';
});

textarea.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); run(); }
  if (e.key === 'Tab') { e.preventDefault(); const s=textarea.selectionStart,end=textarea.selectionEnd; textarea.value=textarea.value.substring(0,s)+'  '+textarea.value.substring(end); textarea.selectionStart=textarea.selectionEnd=s+2; }
});

// ── SAVE to works.json via GitHub API ────────────────────────────
async function ghRead(path) {
  const token = localStorage.getItem(GH_KEY); if (!token) return null;
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { headers:{'Authorization':'Bearer '+token} });
  if (!r.ok) return null;
  const j = await r.json();
  return { content: JSON.parse(atob(j.content.replace(/\n/g,''))), sha: j.sha };
}

async function ghWrite(path, content, sha) {
  const token = localStorage.getItem(GH_KEY); if (!token) { toast('No GitHub token — set one in Admin'); return false; }
  const body = { message:'update '+path, content: btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2)))) };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, { method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(body) });
  return r.ok;
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const code = textarea.value.trim();
  if (!code) { toast('Nothing to save'); return; }
  saveStatus.textContent = 'Saving…';
  try {
    const result = await ghRead('data/works.json');
    if (!result) { toast('Could not read works.json'); saveStatus.textContent = 'Save failed'; return; }
    const { content: works, sha } = result;
    const slug = FAMILY === 'plls' ? 'pills' : FAMILY;
    const idx = works.findIndex(w => w.slug === slug);
    if (idx === -1) { toast('Family "'+slug+'" not found in works.json — add it via Admin first'); saveStatus.textContent = 'Not found'; return; }
    works[idx].drawCode = code;
    works[idx].codeUpdated = Date.now();
    const ok = await ghWrite('data/works.json', works, sha);
    if (ok) {
      toast('Code saved to works.json');
      saveStatus.textContent = 'Saved · ' + new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    } else {
      toast('Save failed — check token');
      saveStatus.textContent = 'Save failed';
    }
  } catch(e) { toast('Error: '+e.message); saveStatus.textContent = 'Error'; }
});

// ── INIT ──────────────────────────────────────────────────────────
if (isAdmin) loadSavedCode();
</script>
</body>
</html>
