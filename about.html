<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hoks — about</title>
<meta name="description" content="Joxemari Gallastegi is a generative artist based in Donostia. Generative art systems built with code and controlled randomness.">

<meta property="og:url" content="https://joxemari.github.io/hoks/about.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="hoks — about">
<meta name="twitter:description" content="Generative art systems built with code and controlled randomness.">
<meta name="twitter:image" content="https://joxemari.github.io/hoks/preview.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; color: #111; }
.about-wrap { padding: 10rem 2rem 6rem; max-width: 640px; margin: 0 auto; }
#about-text {
  font-family: 'Courier New', Courier, monospace;
  font-size: clamp(0.9rem, 1.8vw, 1.1rem);
  font-weight: 400; line-height: 1.8; color: #111;
  margin-bottom: 3rem; letter-spacing: 0.01em;
  visibility: hidden;
}
.about-contact {
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px; color: #aaa;
  letter-spacing: 0.1em; text-transform: uppercase;
}
.about-contact a { color: #111; text-decoration: none; border-bottom: 1px solid #111; }
</style>
</head>
<body>
<script src="nav.js"></script>
<main>
  <div class="about-wrap">
    <p id="about-text"></p>
    <p class="about-contact" id="about-contact"></p>
  </div>
</main>
<script>
const FALLBACK = 'Joxemari Gallastegi is a generative artist based in Donostia. He studied at Stanford University, where he presented his first solo exhibition. His work explores the intersection of code and visual form — algorithmic systems built on geometry, colour, and controlled randomness that make each piece unique by design.';

fetch('https://raw.githubusercontent.com/Joxemari/hoks/main/data/site.json?t=' + Date.now())
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    const t = document.getElementById('about-text');
    const c = document.getElementById('about-contact');
    if (t) {
      t.textContent = d?.aboutText || FALLBACK;
      t.style.visibility = 'visible';
    }
    if (c && d?.footerEmail) {
      c.innerHTML = 'Contact: <a href="mailto:' + d.footerEmail + '">' + d.footerEmail + '</a>';
    }
  })
  .catch(() => {
    const t = document.getElementById('about-text');
    if (t) { t.textContent = FALLBACK; t.style.visibility = 'visible'; }
  });
</script>
</body>
</html>
