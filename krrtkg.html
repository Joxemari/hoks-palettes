// ── GRAIN & GRADIENT TUNING ───────────────────────────
const RECT_ALPHA    = 0.61;  // 155/255
const GRAIN_MAG     = 1.0;
const GRAIN_AMIN    = 0.4;
const GRAIN_AMAX    = 0.8;
const GRAIN_SAMPLES = 3;
const THRESHOLD     = 0.6;

// ── PALETTE PROB ──────────────────────────────────────
function ageWeight(c){if(!c||c<1000000000000)return 4;const d=(Date.now()-c)/86400000;if(d<30)return 4;if(d<90)return 2;if(d<180)return 1;if(d<365)return 0.4;return 0.15;}
function normalizePalettes(pals){const w=pals.map(p=>ageWeight(p.created));const t=w.reduce((a,b)=>a+b,0);return pals.map((p,i)=>({...p,prob:w[i]/t}));}
function palRarityFromProb(p){if(p>0.08)return'common';if(p>0.03)return'uncommon';if(p>0.01)return'rare';if(p>0.003)return'superrare';return'legendary';}

  {id:99,name:"Memphis",active:true,colors:["#ff6b6b","#feca57","#48dbfb","#ff9ff3","#54a0ff","#5f27cd","#00d2d3","#ff9f43","#1dd1a1","#2e2e2e"],created:99},

const RL={common:'Common',uncommon:'Uncommon',rare:'Rare',superrare:'Super Rare',legendary:'Legendary'};
const RC={common:'common',uncommon:'uncommon',rare:'rare',superrare:'superrare',legendary:'legendary'};

let palettes=[],currentSeed=(Math.random()*0xFFFFFFFF)>>>0;
let currentTimestamp=new Date(),gallery=[],lastTraits=[],lastOverall='';

class Rng{
  constructor(s){this.s=(s|0)>>>0;}
  next(){this.s=((Math.imul(1664525,this.s)+1013904223)>>>0);return this.s/4294967296;}
  int(a,b){return Math.floor(a+this.next()*(b-a+1));}
  weighted(items){let v=this.next(),acc=0;for(const i of items){acc+=i.prob;if(v<acc)return i;}return items[items.length-1];}
}

function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

// ── SOFT LIGHT BLEND (from p5 source) ─────────────────
function softLight(base, blend) {
  if (blend <= 0.5) return base - (1 - 2*blend) * base * (1 - base);
  const d = base <= 0.25 ? ((16*base - 12)*base + 4)*base : Math.sqrt(base);
  return base + (2*blend - 1) * (d - base);
}

// ── MESH GRADIENT ─────────────────────────────────────
function drawMeshGradient(ctx, W, H, colors, rng) {
  const n = colors.length;
  const c00 = hexToRgb(colors[rng.int(0,n-1)]);
  const c10 = hexToRgb(colors[rng.int(0,n-1)]);
  const c01 = hexToRgb(colors[rng.int(0,n-1)]);
  const c11 = hexToRgb(colors[rng.int(0,n-1)]);
  const imgData = ctx.createImageData(W, H);
  const px = imgData.data;
  for (let y = 0; y < H; y++) {
    const ty = y / (H-1);
    for (let x = 0; x < W; x++) {
      const tx = x / (W-1);
      const r = (1-tx)*(1-ty)*c00[0] + tx*(1-ty)*c10[0] + (1-tx)*ty*c01[0] + tx*ty*c11[0];
      const g = (1-tx)*(1-ty)*c00[1] + tx*(1-ty)*c10[1] + (1-tx)*ty*c01[1] + tx*ty*c11[1];
      const b = (1-tx)*(1-ty)*c00[2] + tx*(1-ty)*c10[2] + (1-tx)*ty*c01[2] + tx*ty*c11[2];
      const idx = (y*W+x)*4;
      px[idx]=r; px[idx+1]=g; px[idx+2]=b; px[idx+3]=255;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ── BAKE GRAIN ────────────────────────────────────────
function bakeGrain(W, H, paletteColors) {
  let avgR=0,avgG=0,avgB=0;
  for (const hex of paletteColors) {
    const [r,g,b] = hexToRgb(hex);
    avgR+=r; avgG+=g; avgB+=b;
  }
  avgR/=paletteColors.length; avgG/=paletteColors.length; avgB/=paletteColors.length;
  const avgLum = 0.299*avgR + 0.587*avgG + 0.114*avgB + 1;
  const tintR=avgR/avgLum, tintG=avgG/avgLum, tintB=avgB/avgLum;
  const total = W*H;
  const grainR=new Float32Array(total), grainG=new Float32Array(total);
  const grainB=new Float32Array(total), grainA=new Float32Array(total);
  for (let i=0; i<total; i++) {
    let n=0;
    for (let k=0; k<GRAIN_SAMPLES; k++) n+=Math.random();
    const mag = (n/GRAIN_SAMPLES - 0.5) * GRAIN_MAG;
    grainR[i]=0.5+mag*(0.6+tintR*0.4);
    grainG[i]=0.5+mag*(0.6+tintG*0.4);
    grainB[i]=0.5+mag*(0.6+tintB*0.4);
    grainA[i]=GRAIN_AMIN+Math.random()*(GRAIN_AMAX-GRAIN_AMIN);
  }
  return {grainR,grainG,grainB,grainA};
}

// ── APPLY GRAIN ───────────────────────────────────────
function applyGrain(ctx, W, H, grain) {
  const imgData = ctx.getImageData(0, 0, W, H);
  const px = imgData.data;
  const {grainR,grainG,grainB,grainA} = grain;
  for (let i=0; i<W*H; i++) {
    const pi=i*4, a=grainA[i];
    const gr=[grainR[i],grainG[i],grainB[i]];
    for (let c=0; c<3; c++) {
      const base=px[pi+c]/255;
      const blended=softLight(base,gr[c]);
      px[pi+c]=Math.min(255,Math.max(0,((blended*a+base*(1-a))*255)|0));
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// ── GITHUB ────────────────────────────────────────────
async function ghPush(path,content){
  const token=localStorage.getItem(GH_TOKEN_KEY);if(!token)return;
  let sha;try{const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{headers:{'Authorization':'Bearer '+token}});if(r.ok)sha=(await r.json()).sha;}catch(e){}
  const body={message:`update ${path}`,content:btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2))))};
  if(sha)body.sha=sha;
  await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
}

// ── PALETTES ──────────────────────────────────────────
function loadPalettes(){
  const _isExact=new URLSearchParams(window.location.search).get('i')!==null;
  fetch(RAW+'palettes.json?t='+Date.now())
    .then(r=>r.ok?r.json():[...DEFAULTS])
    .then(data=>{
      const active=data.filter(p=>p.active!==false);
      palettes=normalizePalettes(active.length?active:[...DEFAULTS]);
      if(!_isExact)draw(currentSeed);
    })
    .catch(()=>{palettes=normalizePalettes([...DEFAULTS]);if(!(new URLSearchParams(window.location.search).get('i')))draw(currentSeed);});
}

// ── DRAW ──────────────────────────────────────────────
function draw(seed) {
  if (!palettes.length) return;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const rng = new Rng(seed);
  const pal = getActivePalette(rng);
  const colors = pal.colors;
  const margin = Math.round(W * 0.1667);
  const a = W - margin * 2;

  // 1. Mesh gradient background (different RNG stream)
  const rngBg = new Rng(seed ^ 0xDEADBEEF);
  drawMeshGradient(ctx, W, H, colors, rngBg);

  // 2. Build squares (faithful KRRTK algorithm)
  let squares = [{x:margin, y:margin, size:a, color:colors[rng.int(0,colors.length-1)]}];
  let si = 0;
  while (si < squares.length) {
    const sq = squares[si];
    if (sq.size > a/4) {
      const ns = sq.size/2;
      squares.push(
        {x:sq.x,    y:sq.y,    size:ns, color:colors[rng.int(0,colors.length-1)]},
        {x:sq.x+ns, y:sq.y,    size:ns, color:colors[rng.int(0,colors.length-1)]},
        {x:sq.x,    y:sq.y+ns, size:ns, color:colors[rng.int(0,colors.length-1)]},
        {x:sq.x+ns, y:sq.y+ns, size:ns, color:colors[rng.int(0,colors.length-1)]}
      );
      squares.splice(squares.length-1, 1);
    }
    si++;
  }
  const toDraw = squares.map(() => rng.next() > THRESHOLD);
  const drawCount = toDraw.filter(Boolean).length;

  // 3. Draw squares with alpha onto gradient
  for (let i=0; i<squares.length; i++) {
    if (!toDraw[i]) continue;
    const [r,g,b] = hexToRgb(squares[i].color);
    ctx.fillStyle = `rgba(${r},${g},${b},${RECT_ALPHA})`;
    ctx.fillRect(squares[i].x, squares[i].y, squares[i].size, squares[i].size);
  }

  // 4. Bake & apply grain
  const grain = bakeGrain(W, H, colors);
  applyGrain(ctx, W, H, grain);

  // Traits
  const palRarity = palRarityFromProb(pal.prob);
  const coveragePct = Math.round((drawCount/Math.max(1,squares.length))*100);
  const coverageLabel = coveragePct>65?'Dense':coveragePct>35?'Balanced':'Sparse';
  const coverageRarity = coveragePct>65?'uncommon':coveragePct<20?'rare':'common';
  const minSize = squares.reduce((m,sq)=>Math.min(m,sq.size),a);
  const depthLevel = Math.max(1,Math.round(Math.log2(a/Math.max(minSize,1))));
  const depthRarity = depthLevel>=4?'rare':depthLevel>=3?'uncommon':'common';
  const score = pal.prob*(depthRarity==='rare'?0.3:depthRarity==='uncommon'?0.7:1)*(coverageRarity==='rare'?0.3:coverageRarity==='uncommon'?0.7:1);
  const overall = score>0.06?'common':score>0.025?'uncommon':score>0.008?'rare':score>0.002?'superrare':'legendary';

  const traits=[
    {key:'Palette',  val:pal.name, colors:pal.colors, rarity:palRarity},
    {key:'Depth',    val:depthLevel+' levels', rarity:depthRarity},
    {key:'Coverage', val:coverageLabel+' · '+coveragePct+'%', rarity:coverageRarity},
    {key:'Texture',  val:'Grain + Gradient', rarity:'rare'},
  ];
  lastTraits=traits; lastOverall=overall;

  document.getElementById('traitList').innerHTML=traits.map(t=>`
    <div class="trait-row">
      <span class="trait-key">${t.key}</span>
      <span class="trait-right">
        ${t.colors?`<span style="display:flex;gap:2px;align-items:center;">${t.colors.slice(0,6).map(c=>`<span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;border:0.5px solid rgba(0,0,0,0.1);"></span>`).join('')}</span>`:''}
        <span class="trait-val">${t.val}</span>
        <span class="badge ${RC[t.rarity]}">${RL[t.rarity]}</span>
      </span>
    </div>`).join('');
  document.getElementById('overallRarity').innerHTML=`<span class="badge ${RC[overall]}">${RL[overall]}</span>`;
  const ts=currentTimestamp,tsEl=document.getElementById('timestampDisplay');
  if(tsEl)tsEl.textContent=ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function generate(){currentSeed=(Math.random()*0xFFFFFFFF)>>>0;currentTimestamp=new Date();scrambleAndDraw(currentSeed,()=>draw(currentSeed));}

// ── GALLERY ───────────────────────────────────────────
function loadGallery(){fetch(RAW+'krrtkg.json?t='+Date.now()).then(r=>r.ok?r.json():[]).then(data=>{gallery=data;renderGallery();}).catch(()=>{gallery=[];renderGallery();});}
async function saveGallery(){await ghPush('data/krrtkg.json',gallery);}
async function saveToGallery(){const src=document.getElementById('c');const dataUrl=src.toDataURL('image/png');gallery.unshift({seed:currentSeed,dataUrl,savedAt:Date.now()});if(gallery.length>50)gallery=gallery.slice(0,50);toast('Saving…');await saveGallery();renderGallery();toast('Saved to gallery');}
function loadExactIteration(item){const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');const img=new Image();img.onload=()=>{ctx.globalCompositeOperation='source-over';ctx.drawImage(img,0,0,canvas.width,canvas.height);};img.src=item.dataUrl;currentSeed=item.seed;currentTimestamp=item.savedAt?new Date(item.savedAt):new Date();animateSeed(item.seed);const tsEl=document.getElementById('timestampDisplay');const ts=currentTimestamp;if(tsEl)tsEl.textContent=ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});const tl=document.getElementById('traitList');if(tl)tl.innerHTML='<div style="font-size:9px;color:var(--ink3);letter-spacing:0.06em;">Saved iteration — generate a new one to see traits.</div>';const or=document.getElementById('overallRarity');if(or)or.innerHTML='';}
function renderGallery(){const section=document.getElementById('gallerySection'),grid=document.getElementById('galleryGrid');if(!gallery.length){section.style.display='none';return;}section.style.display='block';grid.innerHTML=gallery.map((item,i)=>`<div class="gallery-thumb" data-i="${i}"><img src="${item.dataUrl}" alt="krrtkg ${item.seed}"><div style="display:flex;align-items:center;justify-content:space-between;padding:2px 6px 4px;"><span class="gallery-thumb-seed">#${item.seed}</span></div></div>`).join('');grid.querySelectorAll('.gallery-thumb').forEach(el=>{el.addEventListener('click',()=>{const item=gallery[parseInt(el.dataset.i)];if(item)loadExactIteration(item);});});}

// ── EXPORT ────────────────────────────────────────────
function downloadHD(){
  const src=document.getElementById('c');
  const hd=document.createElement('canvas');
  hd.width=src.width*12; hd.height=src.height*12;
  const ctx=hd.getContext('2d');
  // Redraw at full resolution for print quality
  // Scale up by redrawing with the same seed
  ctx.scale(12,12);
  ctx.drawImage(src,0,0);
  const a=document.createElement('a');
  a.download=`krrtkg_${currentSeed}.png`;
  a.href=hd.toDataURL('image/png');
  a.click();
  toast('PNG downloaded — print-ready');
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function exportCard(){
  const src=document.getElementById('c'),traits=lastTraits,overall=lastOverall;
  if(!traits.length)return;
  const SC=3,mono=`'Courier New', Courier, monospace`;
  const RL2={common:'COMMON',uncommon:'UNCOMMON',rare:'RARE',superrare:'SUPER RARE',legendary:'LEGENDARY'};
  const RC2={common:'#f1efe8',uncommon:'#d4f0e4',rare:'#ddeaf8',superrare:'#eae8fc',legendary:'#faeeda'};
  const RT2={common:'#999',uncommon:'#085041',rare:'#0c447c',superrare:'#3c3489',legendary:'#633806'};
  const rKey=s=>(s||'common').toLowerCase().replace(' ','');
  const artW=src.width*SC,artH=src.height*SC;
  const stripH=Math.round(artH*0.32),pad=Math.round(artW*0.025);
  const headerH=Math.round(stripH*0.32),rowH=Math.round((stripH-headerH)/(traits.length+2));
  const divH=Math.max(1,Math.round(artH*0.001));
  const fs=Math.round(artW*0.0095),fsSm=Math.round(fs*0.78),fsBadge=Math.round(fs*0.7);
  const card=document.createElement('canvas');card.width=artW;card.height=artH+stripH;
  const ctx=card.getContext('2d');
  ctx.drawImage(src,0,0,artW,artH);
  ctx.fillStyle='#fff';ctx.fillRect(0,artH,artW,stripH);
  ctx.fillStyle='#e8e8e8';ctx.fillRect(0,artH,artW,divH);
  ctx.textBaseline='middle';
  const headerMidY=artH+headerH/2;
  const ts=currentTimestamp;
  const dateStr=ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  ctx.font=`700 ${fs}px ${mono}`;ctx.fillStyle='#111';ctx.textAlign='left';ctx.fillText('KRRTKG',pad,headerMidY);
  ctx.font=`400 ${fsSm}px ${mono}`;ctx.fillStyle='#aaa';ctx.textAlign='center';
  ctx.fillText('SEED #'+currentSeed,artW/2,headerMidY-fsSm*0.7);ctx.fillText(dateStr,artW/2,headerMidY+fsSm*0.7);
  const divY=artH+headerH;ctx.fillStyle='#e8e8e8';ctx.fillRect(pad,divY,artW-pad*2,divH);
  const valRight=artW-pad;
  traits.forEach((t,i)=>{
    const rowY=divY+divH+rowH*i+rowH/2;
    ctx.font=`400 ${fsSm}px ${mono}`;ctx.fillStyle='#aaa';ctx.textAlign='left';ctx.fillText(t.key.toUpperCase(),pad,rowY);
    const rk=rKey(t.rarity),rLabel=RL2[rk]||'COMMON';
    ctx.font=`700 ${fsBadge}px ${mono}`;
    const bw=ctx.measureText(rLabel).width+Math.round(rowH*0.3),bh=Math.round(rowH*0.6),bx=valRight-bw;
    ctx.fillStyle=RC2[rk]||RC2.common;roundRect(ctx,bx,rowY-bh/2,bw,bh,Math.round(bh*0.25));ctx.fill();
    ctx.fillStyle=RT2[rk]||RT2.common;ctx.textAlign='left';ctx.fillText(rLabel,bx+Math.round(rowH*0.15),rowY);
    ctx.font=`700 ${fs}px ${mono}`;ctx.fillStyle='#111';ctx.textAlign='right';
    if(t.colors){const dotR=Math.round(rowH*0.22),gap=Math.round(rowH*0.1),dots=t.colors.slice(0,6);const nameW=ctx.measureText(String(t.val)).width,dotsW=dots.length*(dotR*2+gap)-gap;let dotX=bx-gap*2-dotsW-nameW-gap;dots.forEach(c=>{ctx.beginPath();ctx.arc(dotX+dotR,rowY,dotR,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.stroke();dotX+=dotR*2+gap;});ctx.fillStyle='#111';ctx.textAlign='right';ctx.fillText(String(t.val),bx-gap*2,rowY);}
    else{ctx.fillText(String(t.val),bx-Math.round(rowH*0.2),rowY);}
  });
  const overallRowY=divY+divH+rowH*traits.length+rowH/2;
  ctx.fillStyle='#e8e8e8';ctx.fillRect(pad,divY+divH+rowH*traits.length,artW-pad*2,divH);
  ctx.font=`400 ${fsSm}px ${mono}`;ctx.fillStyle='#aaa';ctx.textAlign='left';ctx.fillText('OVERALL',pad,overallRowY);
  const rkO=rKey(overall);ctx.font=`700 ${fsBadge}px ${mono}`;
  const obw=ctx.measureText(RL2[rkO]||'COMMON').width+Math.round(rowH*0.3),obh=Math.round(rowH*0.6),obx=valRight-obw;
  ctx.fillStyle=RC2[rkO]||RC2.common;roundRect(ctx,obx,overallRowY-obh/2,obw,obh,Math.round(obh*0.25));ctx.fill();
  ctx.fillStyle=RT2[rkO]||RT2.common;ctx.fillText(RL2[rkO]||'COMMON',obx+Math.round(rowH*0.15),overallRowY);
  card.toBlob(async blob=>{try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);toast('Card copied to clipboard');}catch(e){const a=document.createElement('a');a.download='krrtkg_'+currentSeed+'.png';a.href=card.toDataURL('image/png');a.click();toast('Downloaded');}});
}


function checkBatchButton(){try{const active=JSON.parse(localStorage.getItem('hoks-active-batch')||'null');const btn=document.getElementById('batchBtn');if(btn){if(active&&active.work==='krrtkg'){btn.style.display='';btn.textContent=`+ Save to Batch "${active.name}" (${active.items.length})`;}else btn.style.display='none';}}catch(e){}}
function saveToBatch(){const src=document.getElementById('c');const dataUrl=src.toDataURL('image/jpeg',0.9);const key='hoks-active-batch';try{const active=JSON.parse(localStorage.getItem(key)||'null');if(!active||active.work!=='krrtkg'){toast('No active KRRTKG batch — create one in Admin');return;}active.items.push({seed:currentSeed,dataUrl,savedAt:Date.now(),palette:active.palette||'random'});localStorage.setItem(key,JSON.stringify(active));checkBatchButton();toast(`Added to batch "${active.name}" (${active.items.length} total)`);}catch(e){toast('Error');}}





// ── PALETTE LOCK (admin only) ──────────────────────────
let _paletteLocked = false;
let _lockedPalIdx = 0;
let _isAdminSession = false;

function checkAdminSession() {
  _isAdminSession = sessionStorage.getItem('hoks-admin-session') === '1';
  if (_isAdminSession) {
    const sec = document.getElementById('paletteSelectorSection');
    if (sec) sec.style.display = '';
    buildPalDropdown();
  }
}

function buildPalDropdown() {
  const sel = document.getElementById('palSelectDropdown');
  if (!sel || !palettes.length) return;
  sel.innerHTML = palettes.map((p,i) => `<option value="${i}">${p.name}</option>`).join('');
  sel.value = _lockedPalIdx;
  updatePalPreviewBar();
}

function togglePaletteLock() {
  _paletteLocked = !_paletteLocked;
  const btn = document.getElementById('palLockBtn');
  const sel = document.getElementById('palSelectDropdown');
  const prev = document.getElementById('palSelectorPreview');
  if (btn) btn.textContent = _paletteLocked ? '🔒' : '🔓';
  if (sel) sel.style.display = _paletteLocked ? '' : 'none';
  if (prev) prev.style.display = _paletteLocked ? '' : 'none';
  if (_paletteLocked) buildPalDropdown();
}

function onManualPalChange() {
  const sel = document.getElementById('palSelectDropdown');
  if (sel) _lockedPalIdx = parseInt(sel.value);
  updatePalPreviewBar();
}

function updatePalPreviewBar() {
  const prev = document.getElementById('palSelectorPreview');
  if (!prev || !palettes[_lockedPalIdx]) return;
  prev.innerHTML = palettes[_lockedPalIdx].colors.map(c =>
    `<span style="flex:1;background:${c}"></span>`).join('');
}

function getActivePalette(rng) {
  if (_paletteLocked && palettes[_lockedPalIdx]) {
    return palettes[_lockedPalIdx];
  }
  return rng ? rng.weighted(palettes) : palettes[Math.floor(Math.random()*palettes.length)];
}




// ── SCRAMBLE + BLUR REVEAL ─────────────────────────────────────────────────
function scrambleAndDraw(seed, drawFn) {
  const el = document.getElementById('seedDisplay');
  const canvas = document.getElementById('c');
  const target = String(seed);
  const chars = '0123456789';
  const STEPS = 22;
  const DURATION = 700; // ms total scramble time
  let step = 0;

  // Show blur while scrambling
  if (canvas) {
    canvas.style.transition = 'none';
    canvas.style.filter = 'blur(16px)';
    canvas.style.opacity = '0.35';
  }
  if (el) {
    if (el._t) clearInterval(el._t);
    el._t = setInterval(() => {
      step++;
      const resolved = Math.floor((step / STEPS) * target.length);
      let txt = '#';
      for (let i = 0; i < target.length; i++) {
        txt += i < resolved ? target[i] : chars[Math.floor(Math.random() * 10)];
      }
      el.textContent = txt;
      if (step >= STEPS) {
        clearInterval(el._t);
        el.textContent = '#' + target;
        // Reset generating flag BEFORE draw so it isn't blocked
        _generating = false;
        drawFn();
        if (canvas) {
          canvas.style.transition = 'filter 0.25s ease, opacity 0.25s ease';
          canvas.style.filter = 'none';
          canvas.style.opacity = '1';
        }
      }
    }, DURATION / STEPS);
  } else {
    drawFn();
  }
}

function animateSeed(seed) {
  const el = document.getElementById('seedDisplay');
  if (el) el.textContent = '#' + seed;
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

const _urlParams=new URLSearchParams(window.location.search),_urlIdx=_urlParams.get('i');
if(_urlIdx!==null){const _wait=setInterval(()=>{if(gallery.length>0){clearInterval(_wait);const item=gallery[parseInt(_urlIdx)];if(item)loadExactIteration(item);}},100);setTimeout(()=>clearInterval(_wait),5000);}

document.getElementById('c').addEventListener('click',generate);
loadPalettes();
loadGallery();
checkBatchButton();
setInterval(checkBatchButton,3000);
