*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { font-family: var(--f); background: var(--bg); color: var(--ink); min-height: 100vh; }

.btn:hover { opacity: 0.75; }
.btn-outline { background: transparent; color: var(--ink); border: 1px solid var(--border-dark); }
.btn-outline:hover { background: var(--surface); opacity: 1; }
.seed-display {
  font-family: var(--f); font-size: 10px; color: var(--ink3);

.trait-key { color: var(--ink3); flex-shrink: 0; text-transform: uppercase; font-size: 9px; letter-spacing: 0.07em; font-weight: 400; min-width: 56px; padding-top: 2px; }
.trait-right { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; justify-content: flex-end; flex: 1; }
.trait-val { font-weight: 700; font-size: 10px; word-break: break-word; text-align: right; }
.badge { font-size: 8px; padding: 1px 5px; border-radius: 20px; white-space: nowrap; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; }
.common    { background: #f1efe8; color: #5f5e5a; }
.uncommon  { background: #e1f5ee; color: #085041; }
.rare      { background: #e6f1fb; color: #0c447c; }
.superrare { background: #eeedfe; color: #3c3489; }
.legendary { background: #faeeda; color: #633806; }
.overall-row { margin-top: 4px; padding-top: 6px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.overall-label { font-size: 9px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
.canvas-area {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2rem; gap: 0.8rem; background: var(--surface); min-height: calc(100vh - 52px);
  position: relative;
}
canvas {
  display: block; height: min(72vh, 580px); width: auto;
  max-width: calc(100vw - 280px); cursor: pointer;
  background: #f5f0ea; outline: 1px solid rgba(0,0,0,0.12);
}
/* Progressive reveal overlay */
.reveal-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; gap: 12px;

.reveal-counter {

// ── PALETTE PROB (age-based scarcity) ─────────────────
function ageWeight(createdMs) {
  if (!createdMs || createdMs < 1000) return 1.0;
  const ageDays = (Date.now() - createdMs) / 86400000;
  if (ageDays < 30)  return 4.0;
  if (ageDays < 90)  return 2.0;
  if (ageDays < 180) return 1.0;
  if (ageDays < 365) return 0.4;
  return 0.15;
}
function normalizePalettes(pals) {
  const weights = pals.map(p => ageWeight(p.created));
  const total = weights.reduce((a,b) => a+b, 0);
  return pals.map((p,i) => ({ ...p, prob: weights[i]/total }));
}
function palRarityFromProb(prob) {
  if (prob > 0.08)  return 'common';
  if (prob > 0.03)  return 'uncommon';
  if (prob > 0.01)  return 'rare';
  if (prob > 0.003) return 'superrare';
  return 'legendary';
}

  Solo:      { solid:0.38, multiply:0.38, translucent:0.08, outline:0.08, grain:0.04, gradient:0.04 },
  Scattered: { solid:0.425,multiply:0.425,translucent:0.0375,outline:0.0375,grain:0.0375,gradient:0.0375 },
  Dense:     { solid:0.46, multiply:0.46, translucent:0.02, outline:0.01, grain:0.025,gradient:0.025 },
};
const FINISH_RARITY = { solid:"common", multiply:"common", translucent:"rare", outline:"rare", grain:"rare", gradient:"rare" };
const RARITY_ORDER  = { common:0, uncommon:1, rare:2, superrare:3, legendary:4 };
const OFF_WHITE     = '#f5f0ea';
const GRAIN_TILE    = 16;
const OVERLAP_TOL   = { Solo:0.15, Scattered:0.35, Dense:0.60 };
const PLACEMENT_ATT = 20;

let palettes = [], currentSeed = rand32(), gallery = [];
let lastTraits = [], lastOverall = '', currentTimestamp = new Date();
let _generating = false;

function rand32() { return Math.random() * 0xFFFFFFFF >>> 0; }

class Rng {
  constructor(s) { this.s = s|0; }
  next() { this.s=(this.s*1664525+1013904223)&0xffffffff; return (this.s>>>0)/4294967296; }
  range(a,b) { return a+this.next()*(b-a); }
  int(a,b) { return Math.floor(this.range(a,b+1)); }
  bool(p=0.5) { return this.next()<p; }
  weighted(items) { let v=this.next(),acc=0; for(const i of items){acc+=i.prob;if(v<acc)return i;} return items[items.length-1]; }
  pickFrom(arr) { return arr[this.int(0,arr.length-1)]; }
}

function hexToRgb(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

function overallRarity(archProb, palProb, rarestFinish) {
  const m = (rarestFinish==='solid'||rarestFinish==='multiply') ? 1 : 0.04;
  const score = archProb * palProb * m;
  if (score > 0.015) return 'common';
  if (score > 0.006) return 'uncommon';
  if (score > 0.002) return 'rare';
  if (score > 0.0004) return 'superrare';
  return 'legendary';
}

// ── GITHUB ────────────────────────────────────────────
async function ghPush(path, content) {
  const token = localStorage.getItem(GH_TOKEN_KEY);
  if (!token) return;
  let sha;
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (r.ok) sha = (await r.json()).sha;
  } catch(e) {}
  const body = { message: `update ${path}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))) };
  if (sha) body.sha = sha;
  await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}

// ── PALETTES ──────────────────────────────────────────
function loadPalettes() {
  const _isExact = new URLSearchParams(window.location.search).get('i') !== null;
  fetch(RAW + 'palettes.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : [...DEFAULTS])
    .then(data => {
      const active = data.filter(p => p.active !== false);
      palettes = normalizePalettes(active.length ? active : [...DEFAULTS]);
      if (!_isExact) draw(currentSeed);
    })
    .catch(() => {
      palettes = normalizePalettes([...DEFAULTS]);
      if (!_isExact) draw(currentSeed);
    });
}

// ── DRAWING ───────────────────────────────────────────
function pillClipPath(ctx,x1,y1,x2,y2,t){const r=t/2,a=Math.atan2(y2-y1,x2-x1);ctx.beginPath();ctx.arc(x1,y1,r,a+Math.PI/2,a+Math.PI*1.5);ctx.arc(x2,y2,r,a-Math.PI/2,a+Math.PI/2);ctx.closePath();}
function drawGrain(ctx,x1,y1,x2,y2,t,color,rng){const[r,g,b]=hexToRgb(color);const alt=rng.bool(0.5)?'#0a0a0a':'#eff7f5';const angle=Math.atan2(y2-y1,x2-x1);const cx=(x1+x2)/2,cy=(y1+y2)/2;const halfLen=Math.hypot(x2-x1,y2-y1)/2+t/2,hw=t/2;const C=[[cx+Math.cos(angle)*halfLen-Math.sin(angle)*hw,cy+Math.sin(angle)*halfLen+Math.cos(angle)*hw],[cx+Math.cos(angle)*halfLen+Math.sin(angle)*hw,cy+Math.sin(angle)*halfLen-Math.cos(angle)*hw],[cx-Math.cos(angle)*halfLen-Math.sin(angle)*hw,cy-Math.sin(angle)*halfLen+Math.cos(angle)*hw],[cx-Math.cos(angle)*halfLen+Math.sin(angle)*hw,cy-Math.sin(angle)*halfLen-Math.cos(angle)*hw]];const xs=C.map(c=>c[0]),ys=C.map(c=>c[1]);const minX=Math.floor(Math.min(...xs)/GRAIN_TILE)*GRAIN_TILE,maxX=Math.ceil(Math.max(...xs)/GRAIN_TILE)*GRAIN_TILE;const minY=Math.floor(Math.min(...ys)/GRAIN_TILE)*GRAIN_TILE,maxY=Math.ceil(Math.max(...ys)/GRAIN_TILE)*GRAIN_TILE;ctx.save();pillClipPath(ctx,x1,y1,x2,y2,t);ctx.clip();for(let tx=minX;tx<maxX;tx+=GRAIN_TILE)for(let ty=minY;ty<maxY;ty+=GRAIN_TILE){const col=Math.round(tx/GRAIN_TILE),row=Math.round(ty/GRAIN_TILE);ctx.fillStyle=(col+row)%2===0?`rgb(${r},${g},${b})`:alt;ctx.fillRect(tx,ty,GRAIN_TILE,GRAIN_TILE);}ctx.restore();}
function drawPill(ctx,x1,y1,x2,y2,t,color,style,rng,colors){const[r,g,b]=hexToRgb(color);ctx.save();if(style==='solid'){ctx.globalCompositeOperation='source-over';ctx.strokeStyle=`rgb(${r},${g},${b})`;ctx.lineWidth=t;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}else if(style==='multiply'){ctx.globalCompositeOperation='multiply';ctx.strokeStyle=`rgb(${r},${g},${b})`;ctx.lineWidth=t;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}else if(style==='translucent'){ctx.globalCompositeOperation='source-over';ctx.strokeStyle=`rgba(${r},${g},${b},${rng.range(0.22,0.55)})`;ctx.lineWidth=t;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}else if(style==='outline'){const bw=Math.max(5,t*0.06),oc=rng.bool(0.5)?'#0a0a0a':'#eff7f5';ctx.globalCompositeOperation='source-over';pillClipPath(ctx,x1,y1,x2,y2,t);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fill();pillClipPath(ctx,x1,y1,x2,y2,t);ctx.strokeStyle=oc;ctx.lineWidth=bw;ctx.stroke();}else if(style==='grain'){drawGrain(ctx,x1,y1,x2,y2,t,color,rng);}else if(style==='gradient'){ctx.globalCompositeOperation='source-over';const a=Math.atan2(y2-y1,x2-x1),px=-Math.sin(a),py=Math.cos(a),h=t/2;const grad=ctx.createLinearGradient((x1+x2)/2+px*h,(y1+y2)/2+py*h,(x1+x2)/2-px*h,(y1+y2)/2-py*h);const[r2,g2,b2]=hexToRgb(rng.pickFrom(colors));grad.addColorStop(0,`rgb(${r},${g},${b})`);grad.addColorStop(1,`rgb(${r2},${g2},${b2})`);pillClipPath(ctx,x1,y1,x2,y2,t);ctx.fillStyle=grad;ctx.fill();}ctx.restore();}
function pickFinish(rng,archName){const probs=FINISH_PROBS[archName];let v=rng.next(),acc=0;for(const[s,p]of Object.entries(probs)){acc+=p;if(v<acc)return s;}return'solid';}
function pillsOverlapTooMuch(ax,ay,aHL,at,bx,by,bHL,bt,tol){const dist=Math.hypot(ax-bx,ay-by),reach=(at+bt)/2+Math.min(aHL,bHL)*0.5;return Math.max(0,reach-dist)/((at/2+bt/2))>tol;}

// ── PROGRESSIVE DRAW ──────────────────────────────────
function draw(s) {
  if (!palettes.length || _generating) return;
  _generating = true;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const rng = new Rng(s);

  const arch = rng.weighted(ARCHETYPES);
  const pal  = getActivePalette(rng);
  const colors = pal.colors;
  const sizePct = rng.range(arch.sizeMin, arch.sizeMax);
  const maxSize = Math.min(W,H) * sizePct;
  const thickness = maxSize * 0.7;
  const numShapes = rng.int(arch.pillMin, arch.pillMax);
  const tol = OVERLAP_TOL[arch.name];

  // Compute all pill positions first
  const pills = [];
  const placed = [];
  for (let i = 0; i < numShapes; i++) {
    const hl = maxSize/4, margin = thickness/2;
    let cx, cy, angle, ok = false;
    for (let att = 0; att < PLACEMENT_ATT; att++) {
      angle = rng.range(0, Math.PI*2);
      const dx = Math.cos(angle)*hl, dy = Math.sin(angle)*hl;
      cx = rng.range(margin+Math.abs(dx), W-margin-Math.abs(dx));
      cy = rng.range(margin+Math.abs(dy), H-margin-Math.abs(dy));
      let bad = false;
      for (const p of placed) if (pillsOverlapTooMuch(cx,cy,hl,thickness,p.cx,p.cy,p.hl,p.t,tol)){bad=true;break;}
      if (!bad){ok=true;break;}
    }
    if (!ok){
      angle = rng.range(0, Math.PI*2);
      const dx = Math.cos(angle)*hl, dy = Math.sin(angle)*hl;
      cx = rng.range(margin+Math.abs(dx), W-margin-Math.abs(dx));
      cy = rng.range(margin+Math.abs(dy), H-margin-Math.abs(dy));
    }
    placed.push({cx,cy,hl,t:thickness});
    const color = rng.pickFrom(colors);
    const style = pickFinish(rng, arch.name);
    pills.push({cx,cy,hl,angle,color,style,thickness});
  }

  // Clear and draw background immediately
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = OFF_WHITE; ctx.fillRect(0,0,W,H);
  let bgTrait = 'Off-white';
  if (rng.bool(0.6)) { ctx.fillStyle = rng.pickFrom(colors); ctx.fillRect(0,0,W,H); bgTrait = 'Colored'; }

  // Show counter
  const counter = document.getElementById('revealCounter');
  counter.classList.add('visible');

  // Draw pills progressively with delay
  let i = 0;
  const styleCount = {};
  const stepDelay = Math.max(20, Math.min(120, 600 / numShapes));

  function step() {
    if (i >= pills.length) {
      ctx.globalCompositeOperation = 'source-over';
      counter.classList.remove('visible');
      _generating = false;
      updateTraits(arch, pal, styleCount, bgTrait, numShapes, s);
      return;
    }
    const pill = pills[i];
    styleCount[pill.style] = (styleCount[pill.style]||0) + 1;
    const x1 = pill.cx - Math.cos(pill.angle)*pill.hl;
    const y1 = pill.cy - Math.sin(pill.angle)*pill.hl;
    const x2 = pill.cx + Math.cos(pill.angle)*pill.hl;
    const y2 = pill.cy + Math.sin(pill.angle)*pill.hl;
    drawPill(ctx, x1, y1, x2, y2, pill.thickness, pill.color, pill.style, rng, colors);
    counter.textContent = `${i+1} / ${numShapes}`;
    i++;
    setTimeout(step, stepDelay);
  }
  step();
}

function updateTraits(arch, pal, styleCount, bgTrait, numShapes, s) {
  const specials = Object.keys(styleCount).filter(k=>k!=='solid'&&k!=='multiply');
  const rarestFinish = specials.length ? specials.sort((a,b)=>RARITY_ORDER[FINISH_RARITY[b]]-RARITY_ORDER[FINISH_RARITY[a]])[0] : 'solid';
  const finishDisplay = [...specials.sort((a,b)=>RARITY_ORDER[FINISH_RARITY[b]]-RARITY_ORDER[FINISH_RARITY[a]]),...(Object.keys(styleCount).filter(k=>k==='solid'||k==='multiply').length?['standard']:[])];
  const overall = overallRarity(arch.prob, pal.prob, rarestFinish);
  const finishRarity = specials.length ? FINISH_RARITY[rarestFinish] : 'common';
  const palRarity = palRarityFromProb(pal.prob);
  const RL={common:'Common',uncommon:'Uncommon',rare:'Rare',superrare:'Super Rare',legendary:'Legendary'};
  const RC={common:'common',uncommon:'uncommon',rare:'rare',superrare:'superrare',legendary:'legendary'};
  const traits = [
    {key:'Density', val:arch.name, rarity:ARCH_RARITY[arch.name]},
    {key:'Palette', val:pal.name, colors:pal.colors, rarity:palRarity},
    {key:'Finish',  val:finishDisplay.join(', '), rarity:finishRarity},
    {key:'Bg',      val:bgTrait, rarity:bgTrait==='Colored'?'common':'uncommon'},
    {key:'Pills',   val:numShapes, rarity:'common'},
  ];
  lastTraits = traits; lastOverall = overall;
  document.getElementById('traitList').innerHTML = traits.map(t=>`
    <div class="trait-row">
      <span class="trait-key">${t.key}</span>
      <span class="trait-right">
        ${t.colors?`<span style="display:flex;gap:2px;align-items:center;">${t.colors.slice(0,6).map(c=>`<span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;border:0.5px solid rgba(0,0,0,0.1);"></span>`).join('')}</span>`:''}
        <span class="trait-val">${t.val}</span>
        <span class="badge ${RC[t.rarity]}">${RL[t.rarity]}</span>
      </span>
    </div>`).join('');
  document.getElementById('overallRarity').innerHTML=`<span class="badge ${RC[overall]}">${RL[overall]}</span>`;
  const ts = currentTimestamp;
  const tsEl = document.getElementById('timestampDisplay');
  if(tsEl) tsEl.textContent = ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

function generate() {
  if (_generating) return;
  currentSeed = rand32();
  currentTimestamp = new Date();
  scrambleAndDraw(currentSeed, () => draw(currentSeed));
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function exportCard() {
  const src=document.getElementById('c');
  const traits=lastTraits,overall=lastOverall;
  if(!traits.length)return;
  const SC=3,mono=`'Courier New', Courier, monospace`;
  const RL2={common:'COMMON',uncommon:'UNCOMMON',rare:'RARE',superrare:'SUPER RARE',legendary:'LEGENDARY'};
  const RC2={common:'#f1efe8',uncommon:'#d4f0e4',rare:'#ddeaf8',superrare:'#eae8fc',legendary:'#faeeda'};
  const RT2={common:'#999',uncommon:'#085041',rare:'#0c447c',superrare:'#3c3489',legendary:'#633806'};
  const rKey=s=>(s||'common').toLowerCase().replace(' ','');
  const artW=src.width*SC,artH=src.height*SC;
  const stripH=Math.round(artH*0.32);
  const pad=Math.round(artW*0.025);
  const headerH=Math.round(stripH*0.32);
  const rowH=Math.round((stripH-headerH)/(traits.length+2));
  const divH=Math.max(1,Math.round(artH*0.001));
  const fs=Math.round(artW*0.0095),fsSm=Math.round(fs*0.78),fsBadge=Math.round(fs*0.7);
  const card=document.createElement('canvas');
  card.width=artW;card.height=artH+stripH;
  const ctx=card.getContext('2d');
  ctx.drawImage(src,0,0,artW,artH);
  ctx.fillStyle='#fff';ctx.fillRect(0,artH,artW,stripH);
  ctx.fillStyle='#e8e8e8';ctx.fillRect(0,artH,artW,divH);
  ctx.textBaseline='middle';
  const headerMidY=artH+headerH/2;
  const ts=currentTimestamp;
  const dateStr=ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  ctx.font=`700 ${fs}px ${mono}`;ctx.fillStyle='#111';ctx.textAlign='left';ctx.fillText('PLLS',pad,headerMidY);
  ctx.font=`400 ${fsSm}px ${mono}`;ctx.fillStyle='#aaa';ctx.textAlign='center';
  ctx.fillText('SEED #'+currentSeed,artW/2,headerMidY-fsSm*0.7);
  ctx.fillText(dateStr,artW/2,headerMidY+fsSm*0.7);
  const divY=artH+headerH;
  ctx.fillStyle='#e8e8e8';ctx.fillRect(pad,divY,artW-pad*2,divH);
  const valRight=artW-pad;
  traits.forEach((t,i)=>{
    const rowY=divY+divH+rowH*i+rowH/2;
    ctx.font=`400 ${fsSm}px ${mono}`;ctx.fillStyle='#aaa';ctx.textAlign='left';ctx.fillText(t.key.toUpperCase(),pad,rowY);
    const rk=rKey(t.rarity),rLabel=RL2[rk]||'COMMON';
    ctx.font=`700 ${fsBadge}px ${mono}`;
    const bw=ctx.measureText(rLabel).width+Math.round(rowH*0.3),bh=Math.round(rowH*0.6),bx=valRight-bw;
    ctx.fillStyle=RC2[rk]||RC2.common;roundRect(ctx,bx,rowY-bh/2,bw,bh,Math.round(bh*0.25));ctx.fill();
    ctx.fillStyle=RT2[rk]||RT2.common;ctx.textAlign='left';ctx.fillText(rLabel,bx+Math.round(rowH*0.15),rowY);
    ctx.font=`700 ${fs}px ${mono}`;ctx.fillStyle='#111';ctx.textAlign='right';
    if(t.colors){
      const dotR=Math.round(rowH*0.22),gap=Math.round(rowH*0.1),dots=t.colors.slice(0,6);
      const nameW=ctx.measureText(String(t.val)).width,dotsW=dots.length*(dotR*2+gap)-gap;
      let dotX=bx-gap*2-dotsW-nameW-gap;
      dots.forEach(c=>{ctx.beginPath();ctx.arc(dotX+dotR,rowY,dotR,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.stroke();dotX+=dotR*2+gap;});
      ctx.fillStyle='#111';ctx.textAlign='right';ctx.fillText(String(t.val),bx-gap*2,rowY);
    } else { ctx.fillText(String(t.val),bx-Math.round(rowH*0.2),rowY); }
  });
  const overallRowY=divY+divH+rowH*traits.length+rowH/2;
  ctx.fillStyle='#e8e8e8';ctx.fillRect(pad,divY+divH+rowH*traits.length,artW-pad*2,divH);
  ctx.font=`400 ${fsSm}px ${mono}`;ctx.fillStyle='#aaa';ctx.textAlign='left';ctx.fillText('OVERALL',pad,overallRowY);
  const rkO=rKey(overall);
  ctx.font=`700 ${fsBadge}px ${mono}`;
  const obw=ctx.measureText(RL2[rkO]||'COMMON').width+Math.round(rowH*0.3),obh=Math.round(rowH*0.6),obx=valRight-obw;
  ctx.fillStyle=RC2[rkO]||RC2.common;roundRect(ctx,obx,overallRowY-obh/2,obw,obh,Math.round(obh*0.25));ctx.fill();
  ctx.fillStyle=RT2[rkO]||RT2.common;ctx.fillText(RL2[rkO]||'COMMON',obx+Math.round(rowH*0.15),overallRowY);
  card.toBlob(async blob=>{
    try{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);toast('Card copied to clipboard');}
    catch(e){const a=document.createElement('a');a.download='pills_'+currentSeed+'.png';a.href=card.toDataURL('image/png');a.click();toast('Downloaded');}
  },'image/png');
}




// ── SEED SCRAMBLE + DELAYED DRAW ──────────────────────
function scrambleAndDraw(seed, drawFn) {
  const el = document.getElementById('seedDisplay');
  const target = String(seed);
  const chars = '0123456789';
  const steps = 22;
  const duration = 750;
  let step = 0;
  if (el && el._scrambleTimer) clearInterval(el._scrambleTimer);
  if (el) {
    el._scrambleTimer = setInterval(() => {
      step++;
      const resolved = Math.floor((step / steps) * target.length);
      let display = '#';
      for (let i = 0; i < target.length; i++) {
        display += i < resolved ? target[i] : chars[Math.floor(Math.random() * 10)];
      }
      el.textContent = display;
      if (step >= steps) {
        clearInterval(el._scrambleTimer);
        el.textContent = '#' + target;
        drawFn();
      }
    }, duration / steps);
  } else {
    drawFn();
  }
}

function animateSeed(seed) {
  scrambleAndDraw(seed, () => {});
}


// ── PALETTE LOCK (admin only) ──────────────────────────
let _paletteLocked = false;
let _lockedPalIdx = 0;
let _isAdminSession = false;

function checkAdminSession() {
  _isAdminSession = sessionStorage.getItem('hoks-admin-session') === '1';
  if (_isAdminSession) {
    const sec = document.getElementById('paletteSelectorSection');
    if (sec) sec.style.display = '';
    buildPalDropdown();
  }
}

function buildPalDropdown() {
  const sel = document.getElementById('palSelectDropdown');
  if (!sel || !palettes.length) return;
  sel.innerHTML = palettes.map((p,i) => `<option value="${i}">${p.name}</option>`).join('');
  sel.value = _lockedPalIdx;
  updatePalPreviewBar();
}

function togglePaletteLock() {
  _paletteLocked = !_paletteLocked;
  const btn = document.getElementById('palLockBtn');
  const sel = document.getElementById('palSelectDropdown');
  const prev = document.getElementById('palSelectorPreview');
  if (btn) btn.textContent = _paletteLocked ? '🔒' : '🔓';
  if (sel) sel.style.display = _paletteLocked ? '' : 'none';
  if (prev) prev.style.display = _paletteLocked ? '' : 'none';
  if (_paletteLocked) buildPalDropdown();
}

function onManualPalChange() {
  const sel = document.getElementById('palSelectDropdown');
  if (sel) _lockedPalIdx = parseInt(sel.value);
  updatePalPreviewBar();
}

function updatePalPreviewBar() {
  const prev = document.getElementById('palSelectorPreview');
  if (!prev || !palettes[_lockedPalIdx]) return;
  prev.innerHTML = palettes[_lockedPalIdx].colors.map(c =>
    `<span style="flex:1;background:${c}"></span>`).join('');
}

function getActivePalette(rng) {
  if (_paletteLocked && palettes[_lockedPalIdx]) {
    return palettes[_lockedPalIdx];
  }
  return rng ? rng.weighted(palettes) : palettes[Math.floor(Math.random()*palettes.length)];
}

    checkBatchButton();
    toast(`Added to batch "${active.name}" (${active.items.length} total)`);
  } catch(e) { toast('Error saving to batch'); }
}

// URL param
const _urlParams=new URLSearchParams(window.location.search),_urlIdx=_urlParams.get('i');
if(_urlIdx!==null){
  const _wait=setInterval(()=>{if(gallery.length>0){clearInterval(_wait);const item=gallery[parseInt(_urlIdx)];if(item)loadExactIteration(item);}},100);
  setTimeout(()=>clearInterval(_wait),5000);
}

document.getElementById('c').addEventListener('click',generate);
loadPalettes();
loadGallery();
checkBatchButton();
setInterval(checkBatchButton, 3000);
</script>
