<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pills — hoks</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --surface: #f7f7f7; --ink: #111111;
  --ink2: #888888; --ink3: #bbbbbb;
  --border: #e8e8e8; --border-dark: #d0d0d0;
  --f: 'Courier New', Courier, monospace; --r: 2px;
}
body { font-family: var(--f); background: var(--bg); color: var(--ink); min-height: 100vh; }
.layout {
  display: grid; grid-template-columns: 240px 1fr;
  min-height: calc(100vh - 52px); margin-top: 52px;
}
/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border); padding: 1.2rem;
  display: flex; flex-direction: column; gap: 1.2rem;
  overflow-y: auto; max-height: calc(100vh - 52px);
  position: sticky; top: 52px;
}
.sidebar-section { display: flex; flex-direction: column; gap: 6px; }
.sidebar-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink3);
}
.btn {
  font-family: var(--f); font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--ink); color: #fff; border: none;
  border-radius: var(--r); padding: 9px 14px;
  cursor: pointer; transition: opacity 0.15s; width: 100%; text-align: center;
}
.btn:hover { opacity: 0.75; }
.btn-outline {
  background: transparent; color: var(--ink);
  border: 1px solid var(--border-dark);
}
.btn-outline:hover { background: var(--surface); opacity: 1; }
.seed-display {
  font-family: var(--f); font-size: 10px; color: var(--ink3);
  padding: 5px 8px; background: var(--surface);
  border-radius: var(--r); border: 1px solid var(--border);
  word-break: break-all; letter-spacing: 0.04em;
}
/* TRAITS — fix overlap */
.trait-list { display: flex; flex-direction: column; gap: 5px; }
.trait-row {
  display: flex; justify-content: space-between;
  align-items: flex-start; font-size: 10px; gap: 4px;
  flex-wrap: wrap;
}
.trait-key {
  color: var(--ink3); flex-shrink: 0;
  text-transform: uppercase; font-size: 9px;
  letter-spacing: 0.07em; font-weight: 400;
  min-width: 56px; padding-top: 2px;
}
.trait-right {
  display: flex; align-items: center; gap: 4px;
  flex-wrap: wrap; justify-content: flex-end; flex: 1;
}
.trait-val { font-weight: 700; font-size: 10px; word-break: break-word; text-align: right; }
.badge {
  font-size: 8px; padding: 1px 5px;
  border-radius: 20px; white-space: nowrap; font-weight: 700;
  letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0;
}
.common { background: #f1efe8; color: #5f5e5a; }
.uncommon { background: #e1f5ee; color: #085041; }
.rare { background: #e6f1fb; color: #0c447c; }
.superrare { background: #eeedfe; color: #3c3489; }
.legendary { background: #faeeda; color: #633806; }
.overall-row {
  margin-top: 4px; padding-top: 6px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.overall-label {
  font-size: 9px; color: var(--ink3); font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
}
/* CANVAS */
.canvas-area {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem; gap: 0.8rem;
  background: var(--surface); min-height: calc(100vh - 52px);
}
canvas {
  display: block;
  height: min(72vh, 580px);
  width: auto;
  max-width: calc(100vw - 280px);
  cursor: pointer;
  background: #f5f0ea;
  outline: 1px solid rgba(0,0,0,0.12);
}
.canvas-hint {
  font-family: var(--f); font-size: 9px;
  color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase;
}
/* GALLERY */
.gallery-section { border-top: 1px solid var(--border); padding: 1.5rem 2rem; }
.gallery-title {
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink3); margin-bottom: 1rem;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px;
}
.gallery-thumb {
  border-radius: 2px; overflow: hidden;
  border: 1px solid var(--border); cursor: pointer;
  transition: border-color 0.15s; position: relative;
}
.gallery-thumb:hover { border-color: var(--border-dark); }
.gallery-thumb img { width: 100%; display: block; }
.gallery-thumb-seed {
  font-size: 9px; font-family: var(--f); color: var(--ink3);
  padding: 4px 6px; background: var(--bg);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff;
  font-family: var(--f); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 9px 18px; border-radius: 2px;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

const GRAIN_TILE    = 16;
const OVERLAP_TOL   = { Solo:0.15, Scattered:0.35, Dense:0.60 };

function rand32() { return Math.random() * 0xFFFFFFFF >>> 0; }

class Rng {
  constructor(s) { this.s = s | 0; }
  next() { this.s=(this.s*1664525+1013904223)&0xffffffff; return (this.s>>>0)/4294967296; }
  range(a,b) { return a+this.next()*(b-a); }
  int(a,b) { return Math.floor(this.range(a,b+1)); }
  bool(p=0.5) { return this.next()<p; }
  weighted(items) { let v=this.next(),acc=0; for(const i of items){acc+=i.prob;if(v<acc)return i;} return items[items.length-1]; }
  pickFrom(arr) { return arr[this.int(0,arr.length-1)]; }
}

function hexToRgb(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }

function overallRarity(archProb, palProb, rarestFinish) {
  const m = (rarestFinish==='solid'||rarestFinish==='multiply') ? 1 : 0.04;
  const score = archProb * palProb * m;
  if (score > 0.015) return 'common';
  if (score > 0.006) return 'uncommon';
  if (score > 0.002) return 'rare';
  if (score > 0.0004) return 'superrare';
  return 'legendary';
}

const RAW = 'https://raw.githubusercontent.com/Joxemari/hoks/main/data/';
const GH_TOKEN_KEY = 'hoks-gh-token';
const REPO = 'Joxemari/hoks';

async function ghPush(path, content) {
  const token = localStorage.getItem(GH_TOKEN_KEY);
  if (!token) return; // no token, skip (visitor mode)
  let sha;
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (r.ok) sha = (await r.json()).sha;
  } catch(e) {}
  const body = { message: `update ${path}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))) };
  if (sha) body.sha = sha;
  await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
}


function loadPalettes() {
  fetch(RAW + 'palettes.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : [...DEFAULTS])
    .then(data => {
      palettes = data.filter(p => p.active !== false);
      if (!palettes.length) palettes = [...DEFAULTS];
      palettes = palettes.map(p => ({ ...p, prob: 1/palettes.length }));
      draw(currentSeed);
    })
    .catch(() => {
      palettes = [...DEFAULTS].map(p => ({ ...p, prob: 1/DEFAULTS.length }));
      draw(currentSeed);
    });
}

function loadGallery() {
  fetch(RAW + 'gallery.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : [])
    .then(data => { gallery = data; renderGallery(); })
    .catch(() => { gallery = []; renderGallery(); });
}

async function saveGallery() {
  await ghPush('data/gallery.json', gallery);
}

async function deleteFromGallery(i) {
  gallery.splice(i,1); await saveGallery(); renderGallery(); toast('Iteration deleted');

function loadExactIteration(item) {
  const canvas = document.getElementById('c');

  const img = new Image();
  img.onload = () => { ctx.globalCompositeOperation='source-over'; ctx.drawImage(img,0,0,canvas.width,canvas.height); };
  img.src = item.dataUrl;
  currentSeed = item.seed;
  currentTimestamp = item.savedAt ? new Date(item.savedAt) : new Date();

  const td = document.getElementById('timestampDisplay');
  if (sd) sd.textContent = '#' + item.seed;
  if (td) { const ts=currentTimestamp; td.textContent=ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

  if (or) or.innerHTML = '';
}
function renderGallery() {
  const section = document.getElementById('gallerySection');

  section.style.display = 'block';
  grid.innerHTML = gallery.map((item,i) => `

  grid.querySelectorAll('.gallery-thumb').forEach(el => {
    el.addEventListener('click', () => {
      const item = gallery[parseInt(el.dataset.i)];
      if (item) loadExactIteration(item);
    });

// ── DRAWING ────────────────────────────────────────────────────────────────
function pillClipPath(ctx,x1,y1,x2,y2,t) {
  const r=t/2,a=Math.atan2(y2-y1,x2-x1);
  ctx.beginPath();
  ctx.arc(x1,y1,r,a+Math.PI/2,a+Math.PI*1.5);
  ctx.arc(x2,y2,r,a-Math.PI/2,a+Math.PI/2);
  ctx.closePath();
}
function drawGrain(ctx,x1,y1,x2,y2,t,color,rng) {
  const [r,g,b]=hexToRgb(color);
  const alt=rng.bool(0.5)?'#0a0a0a':'#eff7f5';
  const angle=Math.atan2(y2-y1,x2-x1);
  const cx=(x1+x2)/2,cy=(y1+y2)/2;
  const halfLen=Math.hypot(x2-x1,y2-y1)/2+t/2,hw=t/2;
  const C=[[cx+Math.cos(angle)*halfLen-Math.sin(angle)*hw,cy+Math.sin(angle)*halfLen+Math.cos(angle)*hw],
            [cx+Math.cos(angle)*halfLen+Math.sin(angle)*hw,cy+Math.sin(angle)*halfLen-Math.cos(angle)*hw],
            [cx-Math.cos(angle)*halfLen-Math.sin(angle)*hw,cy-Math.sin(angle)*halfLen+Math.cos(angle)*hw],
            [cx-Math.cos(angle)*halfLen+Math.sin(angle)*hw,cy-Math.sin(angle)*halfLen-Math.cos(angle)*hw]];
  const xs=C.map(c=>c[0]),ys=C.map(c=>c[1]);
  const minX=Math.floor(Math.min(...xs)/GRAIN_TILE)*GRAIN_TILE,maxX=Math.ceil(Math.max(...xs)/GRAIN_TILE)*GRAIN_TILE;
  const minY=Math.floor(Math.min(...ys)/GRAIN_TILE)*GRAIN_TILE,maxY=Math.ceil(Math.max(...ys)/GRAIN_TILE)*GRAIN_TILE;
  ctx.save(); pillClipPath(ctx,x1,y1,x2,y2,t); ctx.clip();
  for(let tx=minX;tx<maxX;tx+=GRAIN_TILE)
    for(let ty=minY;ty<maxY;ty+=GRAIN_TILE){
      const col=Math.round(tx/GRAIN_TILE),row=Math.round(ty/GRAIN_TILE);
      ctx.fillStyle=(col+row)%2===0?`rgb(${r},${g},${b})`:alt;
      ctx.fillRect(tx,ty,GRAIN_TILE,GRAIN_TILE);
    }
  ctx.restore();
}
function drawPill(ctx,x1,y1,x2,y2,t,color,style,rng,colors) {
  const [r,g,b]=hexToRgb(color);
  ctx.save();
  if(style==='solid'){
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=`rgb(${r},${g},${b})`; ctx.lineWidth=t; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  } else if(style==='multiply'){
    ctx.globalCompositeOperation='multiply';
    ctx.strokeStyle=`rgb(${r},${g},${b})`; ctx.lineWidth=t; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  } else if(style==='translucent'){
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=`rgba(${r},${g},${b},${rng.range(0.22,0.55)})`; ctx.lineWidth=t; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  } else if(style==='outline'){
    const bw=Math.max(5,t*0.06),oc=rng.bool(0.5)?'#0a0a0a':'#eff7f5';
    ctx.globalCompositeOperation='source-over';
    pillClipPath(ctx,x1,y1,x2,y2,t); ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fill();
    pillClipPath(ctx,x1,y1,x2,y2,t); ctx.strokeStyle=oc; ctx.lineWidth=bw; ctx.stroke();
  } else if(style==='grain'){
    drawGrain(ctx,x1,y1,x2,y2,t,color,rng);
  } else if(style==='gradient'){
    ctx.globalCompositeOperation='source-over';
    const a=Math.atan2(y2-y1,x2-x1),px=-Math.sin(a),py=Math.cos(a),h=t/2;
    const grad=ctx.createLinearGradient((x1+x2)/2+px*h,(y1+y2)/2+py*h,(x1+x2)/2-px*h,(y1+y2)/2-py*h);
    const [r2,g2,b2]=hexToRgb(rng.pickFrom(colors));
    grad.addColorStop(0,`rgb(${r},${g},${b})`); grad.addColorStop(1,`rgb(${r2},${g2},${b2})`);
    pillClipPath(ctx,x1,y1,x2,y2,t); ctx.fillStyle=grad; ctx.fill();
  }
  ctx.restore();
}
function pickFinish(rng,archName) {
  const probs=FINISH_PROBS[archName]; let v=rng.next(),acc=0;
  for(const [s,p] of Object.entries(probs)){acc+=p;if(v<acc)return s;} return 'solid';
}
function pillsOverlapTooMuch(ax,ay,aHL,at,bx,by,bHL,bt,tol) {
  const dist=Math.hypot(ax-bx,ay-by),reach=(at+bt)/2+Math.min(aHL,bHL)*0.5;
  return Math.max(0,reach-dist)/((at/2+bt/2)) > tol;
}

function draw(s) {
  if(!palettes.length) return;
  const canvas=document.getElementById('c');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const rng=new Rng(s);
  const arch=rng.weighted(ARCHETYPES);
  const pal=rng.weighted(palettes);
  const colors=pal.colors;
  const sizePct=rng.range(arch.sizeMin,arch.sizeMax);
  const maxSize=Math.min(W,H)*sizePct;
  const thickness=maxSize*0.7;
  const numShapes=rng.int(arch.pillMin,arch.pillMax);
  const tol=OVERLAP_TOL[arch.name];
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=OFF_WHITE; ctx.fillRect(0,0,W,H);

  let bgTrait='Off-white';
  if(rng.bool(0.6)){
    ctx.fillStyle=rng.pickFrom(colors); ctx.fillRect(0,0,W,H); bgTrait='Colored';
  }

  const placed=[],styleCount={};
  for(let i=0;i<numShapes;i++){
    const hl=maxSize/4,margin=thickness/2;
    let cx,cy,angle,ok=false;
    for(let att=0;att<PLACEMENT_ATT;att++){
      angle=rng.range(0,Math.PI*2);
      const dx=Math.cos(angle)*hl,dy=Math.sin(angle)*hl;
      cx=rng.range(margin+Math.abs(dx),W-margin-Math.abs(dx));
      cy=rng.range(margin+Math.abs(dy),H-margin-Math.abs(dy));
      let bad=false;
      for(const p of placed) if(pillsOverlapTooMuch(cx,cy,hl,thickness,p.cx,p.cy,p.hl,p.t,tol)){bad=true;break;}
      if(!bad){ok=true;break;}
    }
    if(!ok){
      angle=rng.range(0,Math.PI*2);
      const dx=Math.cos(angle)*hl,dy=Math.sin(angle)*hl;
      cx=rng.range(margin+Math.abs(dx),W-margin-Math.abs(dx));
      cy=rng.range(margin+Math.abs(dy),H-margin-Math.abs(dy));
    }
    placed.push({cx,cy,hl,t:thickness});
    const color=rng.pickFrom(colors);
    const style=pickFinish(rng,arch.name);
    styleCount[style]=(styleCount[style]||0)+1;
    drawPill(ctx,cx-Math.cos(angle)*hl,cy-Math.sin(angle)*hl,
                  cx+Math.cos(angle)*hl,cy+Math.sin(angle)*hl,
                  thickness,color,style,rng,colors);
  }
  ctx.globalCompositeOperation='source-over';

  const specials=Object.keys(styleCount).filter(k=>k!=='solid'&&k!=='multiply');
  const rarestFinish=specials.length?specials.sort((a,b)=>RARITY_ORDER[FINISH_RARITY[b]]-RARITY_ORDER[FINISH_RARITY[a]])[0]:'solid';
  const finishDisplay=[...specials.sort((a,b)=>RARITY_ORDER[FINISH_RARITY[b]]-RARITY_ORDER[FINISH_RARITY[a]]),...(Object.keys(styleCount).filter(k=>k==='solid'||k==='multiply').length?['standard']:[])];
  const overall=overallRarity(arch.prob,pal.prob,rarestFinish);
  const finishRarity=specials.length?FINISH_RARITY[rarestFinish]:'common';
  const RL={common:'Common',uncommon:'Uncommon',rare:'Rare',superrare:'Super Rare',legendary:'Legendary'};
  const RC={common:'common',uncommon:'uncommon',rare:'rare',superrare:'superrare',legendary:'legendary'};
  const traits=[
    {key:'Density',  val:arch.name,              rarity:ARCH_RARITY[arch.name]},
    {key:'Palette',  val:pal.name, colors:pal.colors, rarity:'common'},
    {key:'Finish',   val:finishDisplay.join(', '),rarity:finishRarity},
    {key:'Bg',       val:bgTrait,                 rarity:bgTrait==='Colored'?'common':'uncommon'},
    {key:'Pills',    val:numShapes,               rarity:'common'},
  ];
  lastTraits=traits; lastOverall=overall;
  document.getElementById('traitList').innerHTML=traits.map(t=>`
    <div class="trait-row">
      <span class="trait-key">${t.key}</span>
      <span class="trait-right">
        ${t.colors?`<span style="display:flex;gap:2px;align-items:center;">${t.colors.slice(0,6).map(c=>`<span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;border:0.5px solid rgba(0,0,0,0.1);"></span>`).join('')}</span>`:''}
        <span class="trait-val">${t.val}</span>
        <span class="badge ${RC[t.rarity]}">${RL[t.rarity]}</span>
      </span>
    </div>`).join('');
  document.getElementById('overallRarity').innerHTML=`<span class="badge ${RC[overall]}">${RL[overall]}</span>`;
  const ts=currentTimestamp;
  const tsStr=ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('seedDisplay').textContent='#'+s;
  const tsEl=document.getElementById('timestampDisplay');
  if(tsEl)tsEl.textContent=tsStr;
}

function generate() { currentSeed=rand32(); currentTimestamp=new Date(); draw(currentSeed); }

function downloadHD() {
  const src=document.getElementById('c');
  const hd=document.createElement('canvas');
  const scale=4;
  hd.width=src.width*scale; hd.height=src.height*scale;
  const ctx=hd.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(src, 0, 0, hd.width, hd.height);
  const a=document.createElement('a');
  a.download=`pills_${currentSeed}.png`; a.href=hd.toDataURL('image/png'); a.click();
  toast('PNG downloaded');
}

async function saveToGallery() {
  const src=document.getElementById('c');
  const dataUrl=src.toDataURL('image/jpeg',0.9);
  gallery.unshift({seed:currentSeed, dataUrl, savedAt: Date.now()});
  if(gallery.length>50) gallery=gallery.slice(0,50);
  toast('Saving…');
  await saveGallery();
  renderGallery();
  toast('Saved to gallery');
}

function exportCard() {
  const src=document.getElementById('c');
  const seed=document.getElementById('seedDisplay')?.textContent||'';
  const traits=lastTraits, overall=lastOverall;
  if(!traits.length) return;

  const SC=3;
  const mono=`'Courier New', Courier, monospace`;
  const RL={common:'COMMON',uncommon:'UNCOMMON',rare:'RARE',superrare:'SUPER RARE',legendary:'LEGENDARY'};
  const RC={common:'#f1efe8',uncommon:'#d4f0e4',rare:'#ddeaf8',superrare:'#eae8fc',legendary:'#faeeda'};
  const RT={common:'#999',uncommon:'#085041',rare:'#0c447c',superrare:'#3c3489',legendary:'#633806'};
  const rKey=s=>(s||'common').toLowerCase().replace(' ','');

  const artW = src.width * SC;
  const artH = src.height * SC;
  const stripH = Math.round(artH * 0.22);
  const pad = Math.round(artW * 0.025);
  const headerH = Math.round(stripH * 0.32);
  const rowH = Math.round((stripH - headerH) / (traits.length + 2));
  const dividerH = Math.max(1, Math.round(artH * 0.001));
  const fs = Math.round(artW * 0.0075);
  const fsSm = Math.round(fs * 0.78);
  const fsBadge = Math.round(fs * 0.7);
  const CW = artW;
  const CH = artH + stripH;

  const card = document.createElement('canvas');
  card.width=CW; card.height=CH;
  const ctx = card.getContext('2d');

  // Artwork
  ctx.drawImage(src, 0, 0, artW, artH);

  // Strip background
  ctx.fillStyle='#ffffff';
  ctx.fillRect(0, artH, CW, stripH);
  ctx.fillStyle='#e8e8e8';
  ctx.fillRect(0, artH, CW, SC);

  ctx.textBaseline='middle';

  // Header row: PILLS left, seed center, date right
  const headerMidY = artH + headerH/2;
  const ts = currentTimestamp;
  const dateStr = ts.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
    +' · '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  ctx.font=`700 ${11*SC}px ${mono}`;
  ctx.fillStyle='#111';
  ctx.textAlign='left';
  ctx.fillText('PILLS', pad, headerMidY);

  ctx.font=`400 ${9*SC}px ${mono}`;
  ctx.fillStyle='#aaa';
  ctx.textAlign='center';
  ctx.fillText('SEED '+seed, CW/2, headerMidY - 7*SC);
  ctx.fillText(dateStr, CW/2, headerMidY + 7*SC);

  // Divider
  const divY = artH + headerH;
  ctx.fillStyle='#e8e8e8';
  ctx.fillRect(pad, divY, CW-pad*2, SC);

  // Trait rows
  const valRight = CW - pad;
  traits.forEach((t, i) => {
    const rowY = divY + dividerH + rowH*i + rowH/2;

    // Key
    ctx.font=`400 ${9*SC}px ${mono}`;
    ctx.fillStyle='#aaa';
    ctx.textAlign='left';
    ctx.fillText(t.key.toUpperCase(), pad, rowY);

    // Rarity badge
    const rk=rKey(t.rarity);
    const rLabel=RL[rk]||'COMMON';
    ctx.font=`700 ${8*SC}px ${mono}`;
    const bw=ctx.measureText(rLabel).width+10*SC;
    const bh=16*SC;
    const bx=valRight-bw;
    const by=rowY-bh/2;
    ctx.fillStyle=RC[rk]||RC.common;
    roundRect(ctx,bx,by,bw,bh,3*SC); ctx.fill();
    ctx.fillStyle=RT[rk]||RT.common;
    ctx.textAlign='left';
    ctx.fillText(rLabel, bx+5*SC, rowY);

    // Value
    ctx.font=`700 ${10*SC}px ${mono}`;
    ctx.fillStyle='#111';
    ctx.textAlign='right';
    const valStr=String(t.val);

    if(t.colors) {
      // Draw palette dots then name
      const dotR=5*SC, gap=3*SC;
      const dots=t.colors.slice(0,8);
      const nameW=ctx.measureText(valStr).width;
      const dotsW=dots.length*(dotR*2+gap)-gap;
      const totalW=dotsW+8*SC+nameW;
      let dotX=bx-8*SC-totalW;
      dots.forEach(c=>{
        ctx.beginPath();
        ctx.arc(dotX+dotR, rowY, dotR, 0, Math.PI*2);
        ctx.fillStyle=c; ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=SC; ctx.stroke();
        dotX+=dotR*2+gap;
      });
      ctx.fillStyle='#111';
      ctx.textAlign='right';
      ctx.fillText(valStr, bx-8*SC, rowY);
    } else {
      ctx.fillText(valStr, bx-8*SC, rowY);
    }
  });

  // Overall row
  const overallRowY = divY + dividerH + rowH*traits.length + rowH/2;
  // Divider above overall
  ctx.fillStyle='#e8e8e8';
  ctx.fillRect(pad, divY + dividerH + rowH*traits.length, CW-pad*2, SC);

  ctx.font=`400 ${9*SC}px ${mono}`;
  ctx.fillStyle='#aaa'; ctx.textAlign='left';
  ctx.fillText('OVERALL', pad, overallRowY);

  const rkO=rKey(overall);
  const oLabel=RL[rkO]||'COMMON';
  ctx.font=`700 ${8*SC}px ${mono}`;
  const obw=ctx.measureText(oLabel).width+10*SC;
  const obh=16*SC;
  const obx=valRight-obw;
  ctx.fillStyle=RC[rkO]||RC.common;
  roundRect(ctx,obx,overallRowY-obh/2,obw,obh,3*SC); ctx.fill();
  ctx.fillStyle=RT[rkO]||RT.common;
  ctx.fillText(oLabel, obx+5*SC, overallRowY);

  card.toBlob(async blob=>{
    try{
      await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
      toast('Card copied to clipboard');
    }catch(e){
      const a=document.createElement('a');
      a.download='pills_'+currentSeed+'.png';
      a.href=card.toDataURL('image/png'); a.click();
      toast('Downloaded (clipboard not supported)');
    }
  },'image/png');
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('c').addEventListener('click',generate);
// Check URL param ?i=N to load exact gallery item from landing
const _urlParams = new URLSearchParams(window.location.search);
const _urlIdx = _urlParams.get('i');
if (_urlIdx !== null) {
  const _waitGallery = setInterval(() => {
    if (gallery.length > 0) {
      clearInterval(_waitGallery);
      const item = gallery[parseInt(_urlIdx)];
      if (item) loadExactIteration(item);
    }
  }, 100);
}

loadPalettes(); loadGallery();
if(palettes.length) draw(currentSeed);
</script>
