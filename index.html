<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hoks</title>
<meta property="og:title" content="hoks">
<meta property="og:description" content="Generative art">
<meta property="og:image" content="https://joxemari.github.io/hoks/preview.png">
<meta property="og:url" content="https://joxemari.github.io/hoks/">
<meta property="og:type" content="website">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; color: #111; }
.work-section { margin-top: 52px; }
.work-item {
  position: relative; cursor: pointer;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: #fff; padding: 2.5rem;
}
.work-item-inner {
  display: flex; flex-direction: column; align-items: flex-end;
}
.work-item canvas {
  display: block;
  width: min(80vw, 1200px);
  height: auto;
  outline: 1px solid rgba(0,0,0,0.08);
  background: #f5f0ea;
}
.work-item-caption {
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px; color: #bbb;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding-top: 8px; text-align: right;
}
.work-item + .work-item {
  border-top: 1px solid #f0f0f0;
}
</style>
</head>
<body>
<script src="nav.js"></script>
<main id="main-content">
  <div class="work-section" id="work-section">
    <div class="work-item" onclick="window.location.href='pills.html?i=0'">
      <div class="work-item-inner">
        <canvas id="c1" width="1414" height="1000"></canvas>
        <div class="work-item-caption" id="c1-caption">Pills</div>
      </div>
    </div>
    <div class="work-item" onclick="window.location.href='pills.html?i=1'">
      <div class="work-item-inner">
        <canvas id="c2" width="1414" height="1000"></canvas>
        <div class="work-item-caption" id="c2-caption">Pills</div>
      </div>
    </div>
    <div class="work-item" onclick="window.location.href='pills.html?i=2'">
      <div class="work-item-inner">
        <canvas id="c3" width="1414" height="1000"></canvas>
        <div class="work-item-caption" id="c3-caption">Pills</div>
      </div>
    </div>
  </div>
</main>
<script>
const LS_GALLERY = 'hoks-pills-gallery';
const FALLBACK_PALS = [
  ["#4464a1","#56a1c4","#ee726b","#ffc5c7","#fef9c6","#df5f50","#f5b800","#ffcc4d","#4b8a5f","#eff7f5"],
  ["#f15946","#e01a4f","#f5a623","#f7dc6f","#2ecc71","#1abc9c","#3498db","#9b59b6","#f0f0f0","#1a1a2e"],
  ["#2d4739","#4a7c59","#8fbc8f","#d4e6c3","#f0ead6","#c9b99a","#8b7355","#5c4a3a","#e8dcc8","#b5c9b7"],
];

function drawPills(canvas, colors, seed) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let s = seed | 0;
  const rng = () => { s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/4294967296; };
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#f5f0ea'; ctx.fillRect(0,0,W,H);
  const n = 5 + Math.floor(rng()*6);
  const maxSize = Math.min(W,H)*(0.28+rng()*0.18);
  const thickness = maxSize*0.7;
  for (let i=0;i<n;i++) {
    const halfLen=maxSize/4, angle=rng()*Math.PI*2;
    const dx=Math.cos(angle)*halfLen, dy=Math.sin(angle)*halfLen;
    const m=thickness/2;
    const x=m+Math.abs(dx)+rng()*(W-m*2-Math.abs(dx)*2);
    const y=m+Math.abs(dy)+rng()*(H-m*2-Math.abs(dy)*2);
    const col=colors[Math.floor(rng()*colors.length)];
    const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    ctx.globalCompositeOperation=rng()<0.5?'multiply':'source-over';
    ctx.strokeStyle=`rgb(${r},${g},${b})`;
    ctx.lineWidth=thickness; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-dx,y-dy); ctx.lineTo(x+dx,y+dy); ctx.stroke();
    ctx.globalCompositeOperation='source-over';
  }
}

function loadCanvases() {
  const canvases = ['c1','c2','c3'];
  const RAW = 'https://raw.githubusercontent.com/Joxemari/hoks/main/data/';

  fetch(RAW + 'gallery.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : [])
    .then(gallery => {
      if (gallery.length >= 3) {
        canvases.forEach((id, i) => {
          const canvas = document.getElementById(id);
          const item = gallery[i];
          const img = new Image();
          img.onload = () => { canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height); };
          img.src = item.dataUrl;
          const cap = document.getElementById(id+'-caption');
          if (cap) {
            const d = item.savedAt ? new Date(item.savedAt) : new Date();
            const dateStr = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
            cap.textContent = 'Pills · #' + item.seed + ' · ' + dateStr;
          }
        });
      } else {
        drawFallbacks();
      }
    })
    .catch(() => drawFallbacks());

  function drawFallbacks() {
    const seeds = [Math.random()*99999|0, Math.random()*99999|0, Math.random()*99999|0];
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    canvases.forEach((id, i) => {
      const canvas = document.getElementById(id);
      drawPills(canvas, FALLBACK_PALS[i%FALLBACK_PALS.length], seeds[i]);
      const cap = document.getElementById(id+'-caption');
      if (cap) cap.textContent = 'Pills · #' + seeds[i] + ' · ' + dateStr;
    });
  }
}
document.addEventListener('DOMContentLoaded', loadCanvases);
</script>
</body>
</html>
