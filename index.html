<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f7f7f7;
  --ink: #111111;
  --ink2: #888888;
  --ink3: #bbbbbb;
  --border: #e8e8e8;
  --border-dark: #d0d0d0;
  --accent: #111111;
  --f: 'Nunito', sans-serif;
  --r: 3px;
}

body {
  font-family: var(--f);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 8rem;
}

/* ── HEADER ─────────────────────────────── */
header {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  border-bottom: 1px solid var(--border);
}

.header-left { display: flex; align-items: center; }

.logo {
  height: 40px;
  width: auto;
  display: block;
}

.btn-new {
  font-family: var(--f);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: var(--r);
  padding: 11px 22px;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-new:hover { opacity: 0.75; }

/* ── CONTROLS ────────────────────────────── */
.controls {
  max-width: 1100px;
  margin: 0 auto;
  padding: 1.5rem 2rem;
  display: flex;
  gap: 10px;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

.search-wrap { flex: 1; min-width: 160px; }

.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 14px;
  font-family: var(--f);
  font-size: 13px;
  font-weight: 400;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--border-dark); }
.search-wrap input::placeholder { color: var(--ink3); }

.sort-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 12px;
  font-family: var(--f);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  outline: none;
}

.count {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink3);
  white-space: nowrap;
}

/* ── GRID ────────────────────────────────── */
.grid {
  max-width: 1100px;
  margin: 2.5rem auto 0;
  padding: 0 2rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

/* ── CARD ────────────────────────────────── */
.palette-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  transition: border-color 0.15s;
  display: flex;
  flex-direction: column;
}

.palette-card:hover { border-color: var(--border-dark); }

.swatches {
  display: flex;
  height: 80px;
  overflow: hidden;
}

.swatch {
  flex: 1;
  cursor: pointer;
  position: relative;
  transition: flex 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.swatch:hover { flex: 2.5; }

.swatch-tip {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.65);
  color: #fff;
  font-family: monospace;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 2px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
}
.swatch:hover .swatch-tip { opacity: 1; }

.card-body { padding: 12px 14px 0; flex: 1; }

.card-name {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.01em;
  color: var(--ink);
}

.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }

.tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 2px 6px;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px 10px;
  gap: 8px;
  margin-top: auto;
}

.hex-list { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; }

.hex-chip {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--ink3);
  cursor: pointer;
  font-family: monospace;
  transition: color 0.12s;
}
.hex-chip:hover { color: var(--ink); }

.card-actions { display: flex; gap: 2px; flex-shrink: 0; }

.btn-icon {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink3);
  font-size: 12px;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 2px;
  transition: color 0.12s, background 0.12s;
}
.btn-icon:hover { color: var(--ink); background: var(--surface); }


/* ── TOGGLE ──────────────────────────────── */
.toggle { position:relative; width:32px; height:18px; flex-shrink:0; display:inline-block; }
.toggle input { opacity:0; width:0; height:0; position:absolute; }
.toggle-track {
  position:absolute; inset:0; background:var(--border-dark);
  border-radius:9px; cursor:pointer; transition:background 0.2s;
}
.toggle input:checked + .toggle-track { background:#111111; }
.toggle-thumb {
  position:absolute; top:3px; left:3px; width:12px; height:12px;
  background:#fff; border-radius:50%; transition:transform 0.2s; pointer-events:none;
  z-index:1;
}
.toggle input:checked + .toggle-track + .toggle-thumb { transform:translateX(14px); }
.palette-card.inactive { opacity:0.45; }
.card-meta { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.card-date { font-size:9px; color:var(--ink3); font-family:monospace; }

/* ── EMPTY ────────────────────────────────── */
.empty-state {
  grid-column: 1/-1;
  padding: 6rem 2rem;
  text-align: center;
}
.empty-big { font-size: 1.5rem; font-weight: 300; color: var(--ink3); letter-spacing: -0.02em; margin-bottom: 8px; }
.empty-sub { font-size: 12px; color: var(--ink3); font-weight: 400; }

/* ── MODAL ────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg);
  border: 1px solid var(--border-dark);
  border-radius: 4px;
  padding: 2rem;
  width: 100%;
  max-width: 440px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(8px);
  transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
  opacity: 0;
  transition: transform 0.2s, opacity 0.18s;
}
.overlay.open .modal { transform: translateY(0); opacity: 1; }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.6rem;
}

.modal h2 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
}

.modal-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink3);
  font-size: 18px;
  line-height: 1;
  padding: 2px 6px;
  transition: color 0.12s;
}
.modal-close:hover { color: var(--ink); }

.field { margin-bottom: 1.1rem; }

.field label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 6px;
}

.field input, .field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 12px;
  font-family: var(--f);
  font-size: 13px;
  font-weight: 400;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus { border-color: var(--border-dark); background: #fff; }

.color-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; min-height: 4px; }

.chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 4px 10px 4px 7px;
  font-size: 11px;
  font-weight: 600;
  font-family: monospace;
  color: var(--ink);
}
.chip-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.12);
  flex-shrink: 0;
}
.chip-rm {
  border: none;
  background: none;
  cursor: pointer;
  color: var(--ink3);
  font-size: 14px;
  line-height: 1;
  padding: 0;
  margin-left: 3px;
  font-family: var(--f);
  transition: color 0.12s;
}
.chip-rm:hover { color: var(--ink); }

.add-row { display: flex; gap: 8px; align-items: center; }

.add-row input[type="color"] {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 2px;
  background: var(--surface);
  cursor: pointer;
  flex-shrink: 0;
}

.add-row input[type="text"] {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 12px;
  font-family: monospace;
  font-size: 12px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s;
}
.add-row input[type="text"]:focus { border-color: var(--border-dark); }

.btn-add-color {
  font-family: var(--f);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 14px;
  cursor: pointer;
  color: var(--ink);
  white-space: nowrap;
  transition: border-color 0.15s, background 0.15s;
}
.btn-add-color:hover { border-color: var(--border-dark); background: #fff; }

.preview-strip {
  height: 14px;
  border-radius: 2px;
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  margin-top: 10px;
}
.preview-strip span { flex: 1; }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 1.6rem;
  padding-top: 1.2rem;
  border-top: 1px solid var(--border);
}

.btn-cancel {
  font-family: var(--f);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 9px 18px;
  color: var(--ink2);
  cursor: pointer;
  transition: border-color 0.15s;
}
.btn-cancel:hover { border-color: var(--border-dark); }

.btn-save {
  font-family: var(--f);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: var(--r);
  padding: 9px 22px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.75; }

/* ── TOAST ────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--ink);
  color: #fff;
  font-family: var(--f);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  z-index: 200;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 520px) {
  header { padding: 2.5rem 1.2rem 1.5rem; flex-direction: column; align-items: flex-start; }
  .controls, .grid { padding: 0 1.2rem; }
  .grid { margin-top: 1.5rem; }
}
</style>

  { id:20, name:"Edit",       colors:["#1c1c1c","#f47a9d","#f4ea7a","#f2f2f2"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-281000 },
  { id:21, name:"Optical",    colors:["#f2eb8a","#fed000","#fc8405","#ed361a","#e2f0f3","#b3dce0","#4464a1","#203051","#ffc5c7","#f398c3","#cf3895","#6d358a","#06b4b0","#4b8a5f"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-280000 },
  { id:22, name:"Homage",     colors:["#fef9c6","#ffcc4d","#f5b800","#56a1c4","#4464a1","#ee726b","#df5f50","#5a3034"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-279000 },
  { id:23, name:"Base",       colors:["#f0f0f0","#8c8c8c","#0f0f0f","#0863d3","#f5d216","#f43809","#08b233","#9913bf"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-278000 },
  { id:24, name:"Ten",        colors:["#fffbe6","#050505","#abcd5e","#29ac9f","#14976b","#b3dce0","#62b6de","#2b67af","#f589a3","#ef562f","#fc8405","#f9d531"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-277000 },
  { id:25, name:"Iris",       colors:["#ebedec","#71859d","#f6d448","#fafafa"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-276000 },
  { id:26, name:"Right",      colors:["#4464a1","#62b6de","#b3dce0","#fafafa","#ffc5c7","#ee726b","#cd1440"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-275000 },
  { id:27, name:"Slussen",    colors:["#fafafa","#f398c3","#f44e24","#f4d730","#23b247","#2a76d3","#0a0a0a"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-274000 },
  { id:28, name:"Poet",       colors:["#f4f3ed","#efc807","#ed5d53","#e2dbb5","#45291c","#080b0f"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-273000 },
  { id:29, name:"Daily",      colors:["#131314","#272829","#ffe18e","#fff0c6"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-272000 },
  { id:30, name:"Podcast",    colors:["#584594","#e488b7","#d74c41","#f0d235","#36ad63","#69bcea","#fdfdfd"], tags:["roni kaufman"], notes:"from ronikaufman.github.io/color_pals", created:Date.now()-271000 },
];

let pals = (() => { try { const r=localStorage.getItem(KEY); return r?JSON.parse(r):[...DEFAULTS]; } catch(e){ return [...DEFAULTS]; }})();
let editId = null, tmpColors = [];

const $ = id => document.getElementById(id);

function persist() { try { localStorage.setItem(KEY, JSON.stringify(pals)); } catch(e){} }

function render() {
  const q = $('search').value.toLowerCase().trim();
  const srt = $('sort').value;
  let list = pals.filter(p => !q || p.name.toLowerCase().includes(q) || (p.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if (srt==='newest') list.sort((a,b)=>b.created-a.created);
  if (srt==='oldest') list.sort((a,b)=>a.created-b.created);
  if (srt==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'es'));
  if (srt==='colors') list.sort((a,b)=>b.colors.length-a.colors.length);

  $('count').textContent = list.length + (list.length===1?' palette':' palettes');
  const grid = $('grid');

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><p class="empty-big">no results</p><p class="empty-sub">try a different search term or add a new palette.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const isActive = p.active !== false;
    const d = new Date(p.created || Date.now());
    const dateStr = d.toLocaleString('es', {month:'short', year:'numeric'});
    return `
    <div class="palette-card${isActive ? '' : ' inactive'}">
      <div class="swatches">
        ${p.colors.map(c=>`<div class="swatch" style="background:${c}" data-hex="${c}"><span class="swatch-tip">${c}</span></div>`).join('')}
      </div>
      <div class="card-body">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;">
          <div style="display:flex;align-items:baseline;gap:7px;min-width:0;">
            <div class="card-name">${esc(p.name)}</div>
            <span class="card-date">${dateStr}</span>
          </div>
          <label class="toggle" title="${isActive ? 'Activa' : 'Inactiva'}">
            <input type="checkbox" ${isActive ? 'checked' : ''} data-toggle="${p.id}">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
        ${p.tags?.length ? `<div class="card-tags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
      <div class="card-footer">
        <div class="hex-list">${p.colors.map(c=>`<span class="hex-chip" data-hex="${c}" title="copiar">${c}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="btn-icon" title="copy all" data-copyall="${p.id}">⎘</button>
          <button class="btn-icon" title="edit" data-edit="${p.id}">✎</button>
          <button class="btn-icon" title="delete" data-del="${p.id}">✕</button>
        </div>
      </div>
    </div>
  `}).join('');
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function copyText(t) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(t);
    } else {
      const ta = document.createElement('textarea');
      ta.value = t;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    toast('copied: ' + t);
  } catch(e) {
    toast('copy failed');
  }
}

function copySwatch(hex, el) {
  copyText(hex);
  const tip = el.querySelector('.swatch-tip');
  if (tip) { tip.textContent='✓'; setTimeout(()=>{ tip.textContent=hex; },1200); }
}

function copyAll(id) {
  const p = pals.find(x=>x.id===id);
  if (p) copyText(p.colors.join(', '));
}

function deletePal(id) {
  if (!confirm('Delete this palette?')) return;
  pals = pals.filter(p=>p.id!==id);
  persist(); render(); toast('palette deleted');
}

function editPal(id) {
  const p = pals.find(x=>x.id===id);
  if (!p) return;
  editId = id;
  $('modalTitle').textContent = 'edit palette';
  $('palName').value = p.name;
  $('palTags').value = (p.tags||[]).join(', ');
  $('palNotes').value = p.notes||'';
  tmpColors = [...p.colors];
  refreshChips();
  openModal(true);
}

function openModal(keep) {
  if (!keep) {
    editId = null;
    $('modalTitle').textContent = 'new palette';
    $('palName').value = '';
    $('palTags').value = '';
    $('palNotes').value = '';
    tmpColors = [];
    refreshChips();
  }
  $('overlay').classList.add('open');
  setTimeout(()=>$('palName').focus(), 150);
}

function closeModal() { $('overlay').classList.remove('open'); }
function closeIfBg(e) { if (e.target===$('overlay')) closeModal(); }

function addColor() {
  let h = $('hexInput').value.trim();
  if (!h) h = $('picker').value;
  if (!h.startsWith('#')) h = '#'+h;
  if (!/^#[0-9a-fA-F]{6}$/.test(h)) { toast('invalid hex — e.g. #ff5500'); return; }
  if (tmpColors.length>=10) { toast('max 10 colors'); return; }
  tmpColors.push(h.toLowerCase());
  $('hexInput').value = '';
  refreshChips();
}

$('picker').addEventListener('input', () => { $('hexInput').value = $('picker').value; });
$('hexInput').addEventListener('input', () => {
  let v = $('hexInput').value.trim();
  if (!v.startsWith('#')) v='#'+v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) $('picker').value = v;
});
$('hexInput').addEventListener('keydown', e => { if (e.key==='Enter') addColor(); });

function refreshChips() {
  $('colorChips').innerHTML = tmpColors.map((c,i)=>`
    <div class="chip">
      <span class="chip-dot" style="background:${c}"></span>
      <span>${c}</span>
      <button class="chip-rm" onclick="rmColor(${i})">×</button>
    </div>`).join('');
  const prev = $('preview');
  if (tmpColors.length) {
    prev.style.display='flex';
    prev.innerHTML = tmpColors.map(c=>`<span style="background:${c}"></span>`).join('');
  } else {
    prev.style.display='none';
  }
}

function rmColor(i) { tmpColors.splice(i,1); refreshChips(); }

function savePal() {
  const name = $('palName').value.trim();
  if (!name) { toast('please add a name'); return; }
  if (!tmpColors.length) { toast('add at least one color'); return; }
  const tags = $('palTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const notes = $('palNotes').value.trim();
  if (editId !== null) {
    const i = pals.findIndex(p=>p.id===editId);
    if (i>=0) pals[i] = {...pals[i], name, colors:[...tmpColors], tags, notes};
    toast('palette updated');
  } else {
    pals.unshift({id:Date.now(), name, colors:[...tmpColors], tags, notes, created:Date.now()});
    toast('palette saved');
  }
  persist(); closeModal(); render();
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

$('search').addEventListener('input', render);
$('sort').addEventListener('change', render);

document.addEventListener('click', e => {
  const tog = e.target.closest('input[data-toggle]');
  if (tog) {
    const id = Number(tog.dataset.toggle);
    const p = pals.find(x=>x.id===id);
    if (p) { p.active = tog.checked; persist(); render(); }
    return;
  }

  const swatch = e.target.closest('.swatch[data-hex]');
  if (swatch) { copySwatch(swatch.dataset.hex, swatch); return; }

  const chip = e.target.closest('.hex-chip[data-hex]');
  if (chip) { copyText(chip.dataset.hex); return; }

  const copyAll = e.target.closest('[data-copyall]');
  if (copyAll) { const p = pals.find(x=>x.id==copyAll.dataset.copyall); if(p) copyText(p.colors.join(', ')); return; }

  const edit = e.target.closest('[data-edit]');
  if (edit) { editPal(Number(edit.dataset.edit)); return; }

  const del = e.target.closest('[data-del]');
  if (del) { deletePal(Number(del.dataset.del)); return; }
});

render();
</script>
</body>
</html>
