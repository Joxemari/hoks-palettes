<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hoks</title>
<meta property="og:title" content="hoks">
<meta property="og:description" content="Generative art">
<meta property="og:image" content="https://joxemari.github.io/hoks/preview.png">
<meta property="og:url" content="https://joxemari.github.io/hoks/">
<meta property="og:type" content="website">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; color: #111; }
.work-section { margin-top: 52px; }
.work-item {
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  padding: 4rem 2rem; min-height: 70vh;
  border-bottom: 1px solid #f0f0f0;
}
.work-item-inner { display: flex; flex-direction: column; align-items: flex-end; }
.work-item canvas {
  display: block;
  /* All works: 50% of viewport width, aspect ratio preserved */
  width: 50vw;
  height: auto;
  outline: 1px solid rgba(0,0,0,0.07);
  background: #f5f0ea;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}
.work-item canvas.square {
  width: 50vw;
  height: 50vw; /* square aspect ratio */
}
.work-item-caption {
  font-family: 'Courier New', Courier, monospace;
  font-size: 9px; color: #bbb; letter-spacing: 0.06em;
  padding-top: 8px; text-align: right; text-transform: uppercase;
}
</style>
</head>
<body>
<script src="nav.js"></script>
<main id="main-content">
  <div class="work-section" id="work-section"></div>
</main>
<script>
const RAW = 'https://raw.githubusercontent.com/Joxemari/hoks/main/data/';

function addWorkItem(section, type, canvas, isSquare, label, idx) {
  const div = document.createElement('div');
  div.className = 'work-item';
  div.onclick = () => window.location.href = `${type}.html?i=${idx}`;
  const inner = document.createElement('div');
  inner.className = 'work-item-inner';
  if (isSquare) canvas.classList.add('square');
  const cap = document.createElement('div');
  cap.className = 'work-item-caption';
  cap.textContent = label;
  inner.appendChild(canvas);
  inner.appendChild(cap);
  div.appendChild(inner);
  section.appendChild(div);
}

function loadCanvases() {
  const section = document.getElementById('work-section');

  Promise.all([
    fetch(RAW+'plls.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(RAW+'krrtk.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(RAW+'dtk.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(RAW+'bzrs.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(RAW+'krrtkg.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch(RAW+'dtkg.json?t='+Date.now()).then(r=>r.ok?r.json():[]).catch(()=>[]),
  ]).then(([pills, krrtk, dtk, bzrs, krrtkg, dtkg]) => {
    const works = [];
    pills.slice(0,2).forEach((item,i) => works.push({type:'pills',item,idx:i}));
    krrtk.slice(0,2).forEach((item,i) => works.push({type:'krrtk',item,idx:i}));
    dtk.slice(0,2).forEach((item,i) => works.push({type:'dtk',item,idx:i}));
    bzrs.slice(0,2).forEach((item,i) => works.push({type:'bzrs',item,idx:i}));
    krrtkg.slice(0,1).forEach((item,i) => works.push({type:'krrtkg',item,idx:i}));
    dtkg.slice(0,1).forEach((item,i) => works.push({type:'dtkg',item,idx:i}));
    if (works.length < 4) {
      pills.slice(2,4).forEach((item,i) => works.push({type:'pills',item,idx:i+2}));
    }

    if (!works.length) {
      // No saved works yet — show nothing
      section.style.minHeight = '80vh';
      section.style.display = 'flex';
      section.style.alignItems = 'center';
      section.style.justifyContent = 'center';
      section.innerHTML = '<p style="font-family:monospace;font-size:10px;color:#ccc;letter-spacing:0.12em;text-transform:uppercase;">No works saved yet</p>';
      return;
    }

    works.forEach(({type,item,idx}) => {
      const isSquare = type === 'krrtk' || type === 'dtk' || type === 'bzrs' || type === 'krrtkg' || type === 'dtkg';
      // Use native canvas resolution — CSS handles display size
      const W = isSquare ? 600 : 1414;
      const H = isSquare ? 600 : 1000;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, W, H);
      img.src = item.dataUrl;
      const d = item.savedAt ? new Date(item.savedAt) : new Date();
      const dateStr = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
      const label = (type==='krrtk'?'KRRTK':type==='dtk'?'DTK':type==='bzrs'?'BZRS':type==='krrtkg'?'KRRTKG':type==='dtkg'?'DTKG':'PLLS')+' · #'+item.seed+' · '+dateStr;
      addWorkItem(section, type, canvas, isSquare, label, idx);
    });
  });
}

document.addEventListener('DOMContentLoaded', loadCanvases);
</script>
</body>
</html>
