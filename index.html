<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const LS_GALLERY = 'hoks-pills-gallery';
const FALLBACK_PALS = [
  ["#4464a1","#56a1c4","#ee726b","#ffc5c7","#fef9c6","#df5f50","#f5b800","#ffcc4d","#4b8a5f","#eff7f5"],
  ["#f15946","#e01a4f","#f5a623","#f7dc6f","#2ecc71","#1abc9c","#3498db","#9b59b6","#f0f0f0","#1a1a2e"],
  ["#2d4739","#4a7c59","#8fbc8f","#d4e6c3","#f0ead6","#c9b99a","#8b7355","#5c4a3a","#e8dcc8","#b5c9b7"],
];

function drawPills(canvas, colors, seed) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let s = seed | 0;
  const rng = () => { s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/4294967296; };
  const bg = colors[Math.floor(rng()*colors.length)];
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  const n = 5 + Math.floor(rng()*6);
  const maxSize = Math.min(W,H)*(0.28+rng()*0.18);
  const thickness = maxSize*0.7;
  for (let i=0;i<n;i++) {
    const halfLen=maxSize/4, angle=rng()*Math.PI*2;
    const dx=Math.cos(angle)*halfLen, dy=Math.sin(angle)*halfLen;
    const m=thickness/2;
    const x=m+Math.abs(dx)+rng()*(W-m*2-Math.abs(dx)*2);
    const y=m+Math.abs(dy)+rng()*(H-m*2-Math.abs(dy)*2);
    const col=colors[Math.floor(rng()*colors.length)];
    const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    ctx.globalCompositeOperation=rng()<0.5?'multiply':'source-over';
    ctx.strokeStyle=`rgb(${r},${g},${b})`;
    ctx.lineWidth=thickness; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-dx,y-dy); ctx.lineTo(x+dx,y+dy); ctx.stroke();
  }
  ctx.globalCompositeOperation='source-over';
}

function loadCanvases() {
  let gallery = [];
  try { gallery = JSON.parse(localStorage.getItem(LS_GALLERY)||'[]'); } catch(e) {}
  const canvases = ['c1','c2','c3'];
  if (gallery.length >= 3) {
    canvases.forEach((id, i) => {
      const canvas = document.getElementById(id);
      const item = gallery[i];
      const img = new Image();
      img.onload = () => {
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      };
      img.src = item.dataUrl;
      const cap = document.getElementById(id + '-caption');
      if (cap) cap.textContent = 'Pills · #' + item.seed;
    });
  } else {
    const seeds = [Math.random()*99999|0, Math.random()*99999|0, Math.random()*99999|0];
    canvases.forEach((id, i) => {
      const canvas = document.getElementById(id);
      const pal = FALLBACK_PALS[i % FALLBACK_PALS.length];
      drawPills(canvas, pal, seeds[i]);
      const cap = document.getElementById(id + '-caption');
      if (cap) cap.textContent = 'Pills · #' + seeds[i];
    });
  }
}

document.addEventListener('DOMContentLoaded', loadCanvases);
</script>
